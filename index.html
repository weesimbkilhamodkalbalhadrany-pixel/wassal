<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>وصّال | Wassal</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background: #f8fafc; color: #1e293b; padding-bottom: 80px; }
        .header { background: #0a2b3e; color: white; padding: 30px 20px; border-radius: 0 0 30px 30px; text-align: center; }
        .container { padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-order { background: #2dd4bf; color: #0a2b3e; font-size: 1.1rem; }
        .btn-order:active { transform: scale(0.95); }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; background: #e2e8f0; margin-top: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #eee; padding: 10px 0; }
        .nav-item { flex: 1; text-align: center; color: #64748b; font-size: 0.8rem; }
        .nav-item.active { color: #2dd4bf; }
    </style>
</head>
<body>

<div class="header">
    <h1>وصّال | Wassal</h1>
    <p>إمبراطورية التوصيل الذكي</p>
</div>

<div class="container">
    <div id="orderSection">
        <h3 style="margin-bottom: 15px;">اطلب خدمة فورية:</h3>
        <div class="card">
            <h4>🚖 طلب تاكسي</h4>
            <p style="color: #64748b; font-size: 0.9rem; margin: 5px 0 15px;">أسرع وسيلة انتقال في صنعاء</p>
            <button class="btn btn-order" onclick="createOrder('تاكسي 🚖')">اطلب الآن</button>
        </div>
        
        <div class="card">
            <h4>📦 خدمة توصيل</h4>
            <p style="color: #64748b; font-size: 0.9rem; margin: 5px 0 15px;">نقل طرود وهدايا</p>
            <button class="btn btn-order" onclick="createOrder('توصيل 📦')">اطلب الآن</button>
        </div>
    </div>

    <div id="notificationStatus" class="card" style="display:none; border-left: 5px solid #2dd4bf;">
        <h4>🔔 وضع المندوب نشط</h4>
        <p>سيتم تنبيهك فور وصول طلبات جديدة...</p>
    </div>
</div>

<nav class="bottom-nav">
    <div class="nav-item active"><i class="fas fa-home"></i><br>الرئيسية</div>
    <div class="nav-item" onclick="activateDriverMode()"><i class="fas fa-bell"></i><br>تنبيهات المندوب</div>
</nav>

<script>
    // 1. إعدادات Firebase (مستقرة وجاهزة)
    const firebaseConfig = {
        apiKey: "AIzaSyCMb07oP2PMUdTlffJjYkbfThC34x1dbtU",
        authDomain: "waselny-2812b.firebaseapp.com",
        databaseURL: "https://waselny-2812b-default-rtdb.firebaseio.com",
        projectId: "waselny-2812b",
        storageBucket: "waselny-2812b.firebasestorage.app",
        messagingSenderId: "662536104158",
        appId: "1:662536104158:web:666db40942313724c3fa4f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. وظيفة إنشاء طلب جديد (العميل)
    function createOrder(serviceName) {
        const orderId = Date.now();
        const orderData = {
            id: orderId,
            service: serviceName,
            status: "pending",
            time: new Date().toLocaleTimeString('ar-SA'),
            timestamp: firebase.database.ServerValue.TIMESTAMP
        };

        db.ref('orders/' + orderId).set(orderData)
            .then(() => {
                alert("✅ تم إرسال طلبك! المندوبين استلموا إشعاراً الآن.");
            })
            .catch((error) => alert("خطأ: " + error.message));
    }

    // 3. نظام الإشعارات الفوري (للمندوب)
    function activateDriverMode() {
        document.getElementById('notificationStatus').style.display = 'block';
        alert("🔔 ارحب ياعمرو.");

        // مراقبة الطلبات الجديدة في Firebase
        db.ref('orders').limitToLast(1).on('child_added', (snapshot) => {
            const newOrder = snapshot.val();
            
            // التأكد أن الطلب جديد (ليس قديم من الأرشيف)
            const now = Date.now();
            if (newOrder.timestamp > (now - 10000)) { 
                playNotificationSound();
                showBrowserNotification("طلب جديد واصل!", "خدمة: " + newOrder.service);
            }
        });
    }

    // 4. وظيفة الصوت والتنبيه
    function playNotificationSound() {
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        audio.play();
    }

    function showBrowserNotification(title, body) {
        if (Notification.permission === "granted") {
            new Notification(title, { body: body, icon: "https://cdn-icons-png.flaticon.com/512/3119/3119338.png" });
        } else if (Notification.permission !== "denied") {
            Notification.requestPermission();
        }
    }

    // اطلب الإذن فور دخول الصفحة
    if (Notification.permission !== "granted") {
        Notification.requestPermission();
    }
</script>

</body>
</html>
