<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>وصّال | Wassal - توصيل ومطاعم</title>
    <!-- OneSignal SDK -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #f8fafc;
            color: #0f172a;
            transition: background 0.2s;
        }
        .app-header {
            background: linear-gradient(135deg, #0a2b3e, #1a4f6e);
            color: white;
            padding: 20px 24px 32px;
            border-radius: 0 0 48px 48px;
            text-align: center;
        }
        .logo-area h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .slogan {
            font-size: 0.8rem;
            color: #2dd4bf;
        }
        .restaurants-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px 16px 80px;
        }
        .restaurant-card {
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: 0.1s;
        }
        .restaurant-card:active {
            transform: scale(0.97);
        }
        .restaurant-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
        }
        .restaurant-info {
            padding: 12px;
            text-align: center;
        }
        .restaurant-info h3 {
            font-size: 1rem;
            font-weight: 800;
        }
        .restaurant-info p {
            font-size: 0.7rem;
            color: #64748b;
        }
        .btn-order {
            background: #f97316;
            color: white;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            margin-top: 8px;
            cursor: pointer;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            border-radius: 32px;
            padding: 24px;
            text-align: center;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            border-radius: 28px;
            border: 1px solid #ddd;
        }
        .btn-submit {
            background: #2dd4bf;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 44px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #10b981;
            color: white;
            padding: 14px;
            border-radius: 30px;
            text-align: center;
            z-index: 2000;
            display: none;
        }
        @media (max-width: 480px) {
            .restaurants-grid {
                gap: 12px;
            }
        }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-area">
        <h1>وصّال | Wassal</h1>
        <div class="slogan">أسرع توصيل للمطاعم في مدينتك</div>
    </div>
</header>

<div class="restaurants-grid" id="restaurantsGrid"></div>

<!-- Modal طلب الطعام -->
<div id="orderModal" class="modal">
    <div class="modal-content">
        <h3 style="color:#f97316" id="modalRestaurantName"></h3>
        <input type="text" id="customerName" placeholder="اسمك الكامل" required>
        <input type="tel" id="customerPhone" placeholder="رقم الجوال" required>
        <textarea id="orderDetails" rows="3" placeholder="اكتب طلبك بالتفصيل (مثلاً: 2 برجر دجاج + بطاطس + بيبسي)"></textarea>
        <input type="text" id="deliveryAddress" placeholder="عنوان التوصيل" required>
        <button class="btn-submit" id="sendOrderBtn">إرسال الطلب وإشعار المدير</button>
        <button onclick="closeModal()" style="background:#ccc; margin-top:8px;" class="btn-submit">إلغاء</button>
    </div>
</div>

<div id="toastMsg" class="toast">✅ تم إرسال الطلب وإشعار المدير</div>

<script>
    // -------------------- OneSignal Initialization --------------------
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    OneSignalDeferred.push(function(OneSignal) {
        OneSignal.init({
            appId: "92000f12-453d-489e-b8e9-d0e87ab807eb",
            safari_web_id: null,
            notifyButton: { enable: true },
            allowLocalhostAsSecureOrigin: true,
        });
        // طلب الإذن فوراً
        OneSignal.showSlidedownPrompt().then(() => {
            console.log("OneSignal prompt shown");
        });
    });

    // -------------------- قائمة المطاعم (18 مطعماً مع صور رمزية عالية الجودة) --------------------
    const restaurants = [
        { id: 1, name: "رويال بروستر", cat: "بروست", img: "https://images.unsplash.com/photo-1626645738196-c2a7c8d08f58?w=400&h=300&fit=crop" },
        { id: 2, name: "البيك رويال", cat: "بروست", img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=400&h=300&fit=crop" },
        { id: 3, name: "شاورما هت", cat: "شاورما", img: "https://images.unsplash.com/photo-1644704170910-a0cdf183649b?w=400&h=300&fit=crop" },
        { id: 4, name: "ستار برجر", cat: "برجر", img: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=400&h=300&fit=crop" },
        { id: 5, name: "شواية المكلا", cat: "مشاوي", img: "https://images.unsplash.com/photo-1599321955419-785373199a8d?w=400&h=300&fit=crop" },
        { id: 6, name: "كنافة تايم", cat: "حلويات", img: "https://images.unsplash.com/photo-1517244681291-03099504f7c1?w=400&h=300&fit=crop" },
        { id: 7, name: "أرسو - ARSO", cat: "عصائر", img: "https://images.unsplash.com/photo-1589733955941-5eeaf752f6dd?w=400&h=300&fit=crop" },
        { id: 8, name: "أمين بيتزا", cat: "بيتزا", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=400&h=300&fit=crop" },
        { id: 9, name: "زيت وزعتر", cat: "فطور", img: "https://images.unsplash.com/photo-1541519227354-08fa5d50c44d?w=400&h=300&fit=crop" },
        { id: 10, name: "خير زمان", cat: "شعبي", img: "https://images.unsplash.com/photo-1591261735099-e3776264e164?w=400&h=300&fit=crop" },
        { id: 11, name: "عشش تهامة", cat: "تهامي", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=400&h=300&fit=crop" },
        { id: 12, name: "سام روستر", cat: "وجبات", img: "https://images.unsplash.com/photo-1626082927389-6cd097cdc6ec?w=400&h=300&fit=crop" },
        { id: 13, name: "هوت سبايسي", cat: "سبايسي", img: "https://images.unsplash.com/photo-1534422298391-e4f8c172dddb?w=400&h=300&fit=crop" },
        { id: 14, name: "مأكولات الشرق", cat: "مشاوي", img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400&h=300&fit=crop" },
        { id: 15, name: "عالم العصائر", cat: "عصائر", img: "https://images.unsplash.com/photo-1622597467827-43094436ae4d?w=400&h=300&fit=crop" },
        { id: 16, name: "فلافل على كيفك", cat: "فطور", img: "https://images.unsplash.com/photo-1593001874117-c99c800e3eb7?w=400&h=300&fit=crop" },
        { id: 17, name: "ركن الحلويات", cat: "حلويات", img: "https://images.unsplash.com/photo-1578985545062-69928b1d9587?w=400&h=300&fit=crop" },
        { id: 18, name: "حضرموت للمندي", cat: "مندي", img: "https://images.unsplash.com/photo-1567620832903-9fc6debc209f?w=400&h=300&fit=crop" }
    ];

    // عرض المطاعم
    const grid = document.getElementById('restaurantsGrid');
    function renderRestaurants() {
        grid.innerHTML = restaurants.map(r => `
            <div class="restaurant-card" onclick="openOrderModal(${r.id}, '${r.name}')">
                <img class="restaurant-img" src="${r.img}" alt="${r.name}" loading="lazy">
                <div class="restaurant-info">
                    <h3>${r.name}</h3>
                    <p>${r.cat}</p>
                    <button class="btn-order">📦 اطلب الآن</button>
                </div>
            </div>
        `).join('');
    }
    renderRestaurants();

    // متغيرات النافذة المنبثقة
    let currentRestaurantId = null;
    let currentRestaurantName = "";

    window.openOrderModal = (id, name) => {
        currentRestaurantId = id;
        currentRestaurantName = name;
        document.getElementById('modalRestaurantName').innerText = name;
        document.getElementById('orderModal').style.display = 'flex';
        // تفريغ الحقول
        document.getElementById('customerName').value = '';
        document.getElementById('customerPhone').value = '';
        document.getElementById('orderDetails').value = '';
        document.getElementById('deliveryAddress').value = '';
    };

    window.closeModal = () => {
        document.getElementById('orderModal').style.display = 'none';
    };

    // -------------------- إرسال الإشعار عبر Vercel Serverless Function (API آمن) --------------------
    // ملاحظة: يجب رفع ملف api/send-notification.js على Vercel كما هو موضح بعد الكود.
    // هنا نستدعي الـ function الخاصة بنا وليس مباشرة OneSignal REST API.
    async function sendOrderNotification(orderData) {
        try {
            // استدعاء الـ API الآمن الذي سننشره على Vercel
            // في التطوير المحلي، يمكنك استخدام proxy أو netlify functions، لكن نضع endpoint جاهز للتعديل.
            // سنفترض أن domain هو نفس domain التطبيق بعد النشر، أو نستخدم endpoint ثابت مؤقت.
            // الحل: نستخدم وظيفة Vercel أو Netlify. للتوضيح، سأكتب الكود لاستدعاء `/api/send-notification`
            const response = await fetch('/api/send-notification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(orderData)
            });
            if (!response.ok) throw new Error('فشل إرسال الإشعار');
            const result = await response.json();
            console.log('إشعار تم:', result);
            return true;
        } catch (error) {
            console.error('خطأ في إرسال الإشعار:', error);
            // في حالة عدم وجود API (للتجربة المحلية) نعرض رسالة وهمية
            alert("لإرسال الإشعار فعلياً، يرجى نشر الـ serverless function على Vercel كما هو موضح في التعليمات. حالياً تم حفظ الطلب محلياً.");
            return false;
        }
    }

    // زر إرسال الطلب
    document.getElementById('sendOrderBtn').addEventListener('click', async () => {
        const customerName = document.getElementById('customerName').value.trim();
        const customerPhone = document.getElementById('customerPhone').value.trim();
        const orderDetails = document.getElementById('orderDetails').value.trim();
        const deliveryAddress = document.getElementById('deliveryAddress').value.trim();

        if (!customerName || !customerPhone || !orderDetails || !deliveryAddress) {
            alert('الرجاء ملء جميع الحقول');
            return;
        }

        // تحضير بيانات الطلب
        const order = {
            restaurantId: currentRestaurantId,
            restaurantName: currentRestaurantName,
            customerName,
            customerPhone,
            orderDetails,
            deliveryAddress,
            timestamp: new Date().toISOString()
        };

        // إرسال الإشعار عبر API الآمن
        const notificationSent = await sendOrderNotification(order);

        // حفظ الطلب في localStorage أو Firebase (يمكن إضافته لاحقاً)
        let orders = JSON.parse(localStorage.getItem('wassal_orders') || '[]');
        orders.push(order);
        localStorage.setItem('wassal_orders', JSON.stringify(orders));

        // إظهار رسالة نجاح
        const toast = document.getElementById('toastMsg');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
        
        closeModal();

        // (اختياري) يمكن أيضاً تسجيل الطلب في Firebase إذا أردت
        // await fetch('https://waselny-2812b-default-rtdb.firebaseio.com/orders.json', { method: 'POST', body: JSON.stringify(order) });
    });

    // -------------------- طلب الإذن بالإشعارات عند أول تفاعل --------------------
    // نطلب الإذن أيضاً عند النقر على أي مطعم (لضمان الحصول على token)
    document.body.addEventListener('click', (e) => {
        if (window.OneSignalDeferred) {
            OneSignalDeferred.push(function(OneSignal) {
                OneSignal.registerForPushNotifications();
            });
        }
    }, { once: true });
</script>

<!-- شرح تضمين Serverless Function على Vercel (لن يظهر للمستخدم لكن المبرمج يقرأه) -->
<!-- 
    ========== تعليمات إنشاء API آمن لإرسال الإشعارات عبر OneSignal ==========
    1. في مجلد المشروع، أنشئ ملف: api/send-notification.js
    2. ضع الكود التالي فيه (مع استبدال REST_API_KEY بمفتاحك الحقيقي):
    
    export default async function handler(req, res) {
        if (req.method !== 'POST') return res.status(405).json({ error: 'Method not allowed' });
        const { restaurantName, customerName, customerPhone, orderDetails, deliveryAddress } = req.body;
        const ONESIGNAL_APP_ID = '92000f12-453d-489e-b8e9-d0e87ab807eb';
        const ONESIGNAL_REST_KEY = 'os_v2_app_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'; // ضع مفتاح REST API الحقيقي هنا
        const message = {
            app_id: ONESIGNAL_APP_ID,
            headings: { en: `طلب جديد من ${restaurantName}` },
            contents: { en: `من ${customerName} (${customerPhone}) - ${orderDetails.substring(0, 100)}` },
            included_segments: ['Subscribed Users'],
            data: { type: 'new_order', restaurant: restaurantName, phone: customerPhone }
        };
        try {
            const response = await fetch('https://onesignal.com/api/v1/notifications', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: `Basic ${ONESIGNAL_REST_KEY}` },
                body: JSON.stringify(message)
            });
            const data = await response.json();
            res.status(200).json({ success: true, data });
        } catch (error) {
            res.status(500).json({ error: error.message });
        }
    }

    3. ارفع المشروع إلى GitHub ثم إلى Vercel (يربط تلقائياً).
    4. بعد النشر، ستصبح الـ API متاحة على https://اسم-مشروعك.vercel.app/api/send-notification
    5. الكود الأمامي أعلاه يستدعي `/api/send-notification` مباشرة (نسبي) ويعمل تلقائياً بعد النشر.
    
    ملاحظة أمان: المفتاح موجود فقط في الـ serverless function وليس في الكود الأمامي.
-->
</body>
</html>
