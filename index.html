    <script>
        // ==================== بيانات Supabase (تم التعديل) ====================
        const supabaseUrl = 'https://vzklmatyfnraqkdxlhbo.supabase.co';
        const supabaseKey = 'sb_publishable_tjhBZfOIMrZxz6pxC40IaQ_zfv68C5q';
        const supabase = supabaseClient.createClient(supabaseUrl, supabaseKey);

        // ==================== البيانات الثابتة (نفسها) ====================
        const allRestaurantsData = [ /* ... 40 مطعم ... */ ];
        const supermarketsData = [ /* ... */ ];
        const pharmaciesData = [ /* ... */ ];
        const sheinData = { /* ... */ };
        const sheinSliderImages = [ /* ... */ ];

        // ==================== متغيرات عامة ====================
        let currentUser = null, allOrders = [], allRestaurants = allRestaurantsData;
        let cart = [], currentRestaurant = null;
        let customerLocation = null, deliveryCost = 0;
        let deliveryFrom = null, deliveryTo = null, deliveryCostNew = 0;
        let selectedPaymentMethod = 'cash';
        let map, marker, currentMapMode = null;
        let modalQuantity = 1, modalNote = "";
        let pendingOrderId = null, pendingStatus = null;
        let trackingInterval = null;
        let lastOrderStatus = null;
        let pendingModalAction = null;
        const DRIVER_PASSWORD = "weesim73741";
        const ADMIN_PASSWORD = "weesim73741";
        let MIN_DELIVERY_PRICE = 550, PRICE_PER_KM = 180;
        const RESTAURANT_LAT = 15.285158;
        const RESTAURANT_LNG = 44.2207412;

        // ==================== دوال مساعدة ====================
        function showToast(msg) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
        function calculateDistance(lat1, lng1, lat2, lng2) { const R = 6371; const dLat = (lat2 - lat1) * Math.PI / 180; const dLng = (lng2 - lng1) * Math.PI / 180; const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2; return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)); }
        function roundToNearestHundred(num) { return Math.round(num/100)*100; }
        function getItemImage(name) { /* ... */ return 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300'; }
        function getStatusText(st) { const m = { pending: 'قيد المراجعة', on_the_way: 'في الطريق', arrived: 'وصل الموقع', delivered: 'تم التوصيل' }; return m[st] || st; }

        // ==================== دوال Supabase (بدلاً من Firebase) ====================
        async function loadOrders() {
            try {
                const { data, error } = await supabase.from('orders').select('*').order('id', { ascending: false });
                if (error) throw error;
                allOrders = data || [];
            } catch (e) { console.error("Error loading orders:", e); allOrders = []; }
        }
        async function updateOrder(id, updates) {
            try {
                const { error } = await supabase.from('orders').update(updates).eq('id', id);
                if (error) throw error;
                await loadOrders();
            } catch (e) { console.error("Error updating order:", e); showToast("حدث خطأ أثناء تحديث الطلب"); }
        }
        async function updateUserBusy(phone, isBusy) {
            try {
                const { error } = await supabase.from('users').update({ isBusy }).eq('phone', phone);
                if (error) throw error;
            } catch (e) { console.error("Error updating user busy status:", e); }
        }

        // ==================== باقي الدوال (نفسها ولكن باستخدام Supabase) ====================
        // دوال العرض والتفاعل (لم تتغير إلا في استدعاءات قاعدة البيانات)
        // تم تعديل دوال confirmCheckoutOrder, confirmDeliveryOrder, submitRating, 
        // acceptOrder, rejectOrder, updateOrder, updateUserBusy لاستخدام Supabase

        // ... هنا جميع الدوال الأخرى (تم تعديلها لاستخدام supabase بدلاً من fetch) ...

        // ==================== تسجيل الدخول ====================
        async function initLogin() {
            // ... نفس الكود ولكن يستخدم supabase لإضافة المستخدم ...
            const loginBtn = document.getElementById('loginBtn');
            loginBtn.onclick = async function() {
                let isDriver = document.getElementById('roleDriver').classList.contains('active');
                let name = document.getElementById('loginName').value.trim();
                let phone = document.getElementById('loginPhone').value.trim();
                let password = document.getElementById('loginPassword').value.trim();
                if (!name || !phone) { showToast('يرجى إدخال الاسم ورقم الهاتف'); return; }
                if (isDriver) {
                    if (!password) { showToast('⚠️ المندوب يجب أن يدخل كلمة السر!'); return; }
                    if (password !== DRIVER_PASSWORD) { showToast('❌ كلمة السر للمندوب غير صحيحة!'); return; }
                }
                let role = isDriver ? 'driver' : 'customer';
                try {
                    const { error } = await supabase.from('users').upsert({ phone, name, role, isBusy: false }, { onConflict: 'phone' });
                    if (error) throw error;
                } catch (e) { showToast('حدث خطأ أثناء تسجيل الدخول'); return; }
                currentUser = { role, phone, name };
                localStorage.setItem('waselny_user', JSON.stringify(currentUser));
                document.getElementById('loginOverlay').style.display = 'none';
                if (role === 'driver') { showPage('driverPage'); document.getElementById('driverNameDisplay').innerText = name; refreshDriverPanel(); }
                else showPage('homePage');
                showToast(`أهلاً ${name}`);
            };
        }

        // ==================== بدء التطبيق ====================
        function startApp() {
            renderMainCarousel();
            renderCategories();
            renderOffers();
            initPaymentList();
            renderFilters();
            renderRestaurantsList();
            startMainCarouselAuto();
            // التحقق من وجود مستخدم مسجل
            let savedUser = localStorage.getItem('waselny_user');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    document.getElementById('loginOverlay').style.display = 'none';
                    if (currentUser.role === 'driver') { showPage('driverPage'); refreshDriverPanel(); }
                    else showPage('homePage');
                } catch (e) { initLogin(); }
            } else { initLogin(); }
        }

        // استدعاء startApp عند تحميل الصفحة
        document.addEventListener('DOMContentLoaded', startApp);
    </script>
