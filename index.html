<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق وصال | WASAL</title>
    <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #2ec4b6;
            --secondary-color: #ff9f1c;
            --dark-color: #011627;
            --light-color: #fdfffc;
            --danger-color: #e71d36;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: var(--dark-color);
        }

        /* الهيكل العام للصفحات */
        .page {
            display: none;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .page.active {
            display: block;
        }

        h1, h2, h3 {
            text-align: center;
            color: var(--dark-color);
        }

        /* الأزرار والعناصر العامة */
        .btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: var(--primary-color);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #24a195;
        }

        .btn-secondary {
            background-color: var(--secondary-color);
        }

        .btn-secondary:hover {
            background-color: #e08a12;
        }

        .btn-danger {
            background-color: var(--danger-color);
        }

        .btn-refresh {
            background-color: #e2e8f0;
            color: var(--dark-color);
            border: 1px solid #cbd5e1;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* كروت الطلبات */
        .order-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
            border-right: 5px solid var(--primary-color);
        }

        .order-card.active-order {
            border-right-color: var(--secondary-color);
        }

        .order-meta {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #666;
            margin-top: 10px;
        }

        /* مؤشر السحب للتحديث البسيط */
        .pull-indicator {
            text-align: center;
            padding: 10px;
            color: var(--primary-color);
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <!-- 1. صفحة اختيار الدور -->
    <div id="rolePage" class="page active">
        <h1>مرحباً بك في وصال 👋</h1>
        <p style="text-align: center;">الرجاء اختيار نوع الحساب للدخول السريع</p>
        <button class="btn" onclick="loginAs('client')"><i class="fas fa-user"></i> دخول كـ عميل</button>
        <button class="btn btn-secondary" onclick="loginAs('driver')"><i class="fas fa-truck"></i> دخول كـ مندوب توصيل</button>
    </div>

    <!-- 2. واجهة العميل -->
    <div id="clientPage" class="page">
        <h2>لوحة تحكم العميل 🛒</h2>
        <div class="form-group">
            <label>تفاصيل الطلب:</label>
            <input type="text" id="orderItems" placeholder="مثال: وجبة برجر مع بطاطس بيبسي">
        </div>
        <div class="form-group">
            <label>عنوان التوصيل:</label>
            <input type="text" id="deliveryLocation" placeholder="مثال: الحي السياسي - بجانب مسجد العاقل">
        </div>
        <button class="btn" onclick="createNewOrder()">إرسال الطلب الآن</button>
        <button class="btn btn-danger" onclick="logout()">تسجيل الخروج</button>
    </div>

    <!-- 3. واجهة تتبع العميل -->
    <div id="trackingPage" class="page">
        <h2>تتبع حالة طلبك 📍</h2>
        <div class="order-card" style="text-align: center;">
            <h3 id="trackStatus">جاري البحث عن مندوب...</h3>
            <p id="trackDetails">انتظر قبول طلبك من أقرب مندوب في المنطقة.</p>
            <div id="driverInfo" style="margin-top: 15px; font-weight: bold; color: var(--secondary-color);"></div>
        </div>
        <button class="btn btn-danger" onclick="cancelTracking()">إلغاء التتبع والعودة</button>
    </div>

    <!-- 4. واجهة المندوب -->
    <div id="driverPage" class="page">
        <h2>لوحة تحكم المندوب 📦</h2>
        
        <!-- زر التحديث اليدوي البديل للتحديث التلقائي المستمر -->
        <button onclick="refreshDriverPanel()" class="btn btn-refresh">
            <i class="fas fa-sync-alt"></i> تحديث الطلبات المتاحة (يدوي)
        </button>

        <!-- مؤشر السحب لأسفل للتحديث -->
        <div id="pullIndicator" class="pull-indicator">
            <i class="fas fa-arrow-down"></i> اسحب أكثر للتحديث...
        </div>

        <h3>الطلبات النشطة (التي تخدمها حالياً)</h3>
        <div id="myActiveOrders"></div>

        <h3 style="margin-top: 25px;">الطلبات المتاحة في النظام</h3>
        <div id="availableOrdersList"></div>

        <button class="btn btn-danger" onclick="logout()" style="margin-top: 20px;">تسجيل الخروج</button>
    </div>

    <script>
        // الرابط الافتراضي لـ Firebase REST API
        const FIREBASE_URL = "https://wasal-app-default-rtdb.firebaseio.com/orders"; 

        let currentUser = { role: null };
        let trackingInterval = null;
        let currentOrderId = null;

        // دالة التنقل بين الصفحات
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        // محاكاة تسجيل الدخول السريع
        function loginAs(role) {
            currentUser.role = role;
            if (role === 'client') {
                showPage('clientPage');
            } else if (role === 'driver') {
                showPage('driverPage');
                refreshDriverPanel(); // تحديث أولي عند الدخول مباشرة
                initPullToRefresh();   // تفعيل ميزة السحب للتحديث في واجهة المندوب
            }
        }

        // تسجيل الخروج وتنظيف العدادات
        function logout() {
            currentUser.role = null;
            if (trackingInterval) {
                clearInterval(trackingInterval);
                trackingInterval = null;
            }
            showPage('rolePage');
        }

        // --- كود قسم العميل ---

        function createNewOrder() {
            const items = document.getElementById('orderItems').value;
            const location = document.getElementById('deliveryLocation').value;

            if(!items || !location) {
                alert('الرجاء ملء الحقول المطلوبة');
                return;
            }

            const orderData = {
                items: items,
                location: location,
                status: "pending",
                driverId: null,
                timestamp: Date.now()
            };

            // إرسال الطلب إلى Firebase
            fetch(`${FIREBASE_URL}.json`, {
                method: 'POST',
                body: JSON.stringify(orderData)
            })
            .then(res => res.json())
            .then(data => {
                currentOrderId = data.name; // حفظ معرف الطلب المرتجع من Firebase
                startTracking(currentOrderId);
            })
            .catch(err => console.error("خطأ في إرسال الطلب:", err));
        }

        function startTracking(orderId) {
            showPage('trackingPage');
            checkOrderStatus(orderId);
            
            // ⏱️ تعديل واجهة العميل: التحديث أصبح كل 7 ثوانٍ (7000ms) بدلاً من 3 ثوانٍ لتوفير البيانات
            trackingInterval = setInterval(() => {
                checkOrderStatus(orderId);
            }, 7000); 
        }

        function checkOrderStatus(orderId) {
            fetch(`${FIREBASE_URL}/${orderId}.json`)
            .then(res => res.json())
            .then(order => {
                if(!order) return;

                const statusElement = document.getElementById('trackStatus');
                const detailsElement = document.getElementById('trackDetails');
                const driverInfo = document.getElementById('driverInfo');

                if (order.status === 'pending') {
                    statusElement.innerText = "جاري البحث عن مندوب... 🔍";
                    detailsElement.innerText = "طلبك متاح الآن في قائمة الطلبات لجميع المناديب النشطين.";
                    driverInfo.innerText = "";
                } else if (order.status === 'accepted') {
                    statusElement.innerText = "تم قبول طلبك! 🎉";
                    detailsElement.innerText = `المندوب متوجه حالياً لاستلام وتوصيل طلبك: (${order.items})`;
                    driverInfo.innerText = `🚴 المندوب رقم: ${order.driverId} في طريقه إليك.`;
                } else if (order.status === 'delivered') {
                    statusElement.innerText = "تم التوصيل بنجاح 🏁";
                    detailsElement.innerText = "شكراً لاستخدامك تطبيق وصال!";
                    driverInfo.innerText = "";
                    clearInterval(trackingInterval); // إيقاف التتبع عند اكتمال الطلب
                }
            });
        }

        function cancelTracking() {
            if (trackingInterval) clearInterval(trackingInterval);
            showPage('clientPage');
        }


        // --- كود قسم المندوب (المعدل والمحسّن بالكامل) ---

        // دالة جلب البيانات وتحديث الواجهة يدوياً
        function refreshDriverPanel() {
            fetch(`${FIREBASE_URL}.json`)
            .then(res => res.json())
            .then(orders => {
                const availableContainer = document.getElementById('availableOrdersList');
                const myActiveContainer = document.getElementById('myActiveOrders');
                
                availableContainer.innerHTML = '';
                myActiveContainer.innerHTML = '';

                if (!orders) {
                    availableContainer.innerHTML = '<p style="text-align:center; color:#888;">لا توجد طلبات متاحة حالياً.</p>';
                    myActiveContainer.innerHTML = '<p style="text-align:center; color:#888;">ليس لديك طلبات نشطة.</p>';
                    return;
                }

                let hasAvailable = false;
                let hasActive = false;

                // Loop على الطلبات القادمة وبناء الواجهة لمرة واحدة
                Object.keys(orders).forEach(id => {
                    const order = orders[id];
                    
                    if (order.status === 'pending') {
                        hasAvailable = true;
                        availableContainer.innerHTML += `
                            <div class="order-card">
                                <strong>📦 الطلب:</strong> ${order.items}<br>
                                <strong>📍 الموقع:</strong> ${order.location}
                                <div class="order-meta">
                                    <button class="btn" style="padding:6px; margin:5px 0 0 0;" onclick="acceptOrder('${id}')">قبول وتوصيل</button>
                                </div>
                            </div>
                        `;
                    } else if (order.status === 'accepted' && order.driverId === 'Driver_101') { // محاكاة معرف المندوب الحالي
                        hasActive = true;
                        myActiveContainer.innerHTML += `
                            <div class="order-card active-order">
                                <strong>📦 طلب نشط:</strong> ${order.items}<br>
                                <strong>📍 العنوان:</strong> ${order.location}
                                <button class="btn btn-secondary" style="padding:6px; margin:10px 0 0 0;" onclick="completeOrder('${id}')">تم التوصيل للعميل ✅</button>
                            </div>
                        `;
                    }
                });

                if(!hasAvailable) availableContainer.innerHTML = '<p style="text-align:center; color:#888;">لا توجد طلبات متاحة حالياً.</p>';
                if(!hasActive) myActiveContainer.innerHTML = '<p style="text-align:center; color:#888;">ليس لديك طلبات نشطة.</p>';
            })
            .catch(err => console.error("خطأ في جلب بيانات المندوب:", err));
        }

        function acceptOrder(orderId) {
            const updateData = {
                status: "accepted",
                driverId: "Driver_101" // معرف المندوب الافتراضي
            };

            fetch(`${FIREBASE_URL}/${orderId}.json`, {
                method: 'PATCH',
                body: JSON.stringify(updateData)
            })
            .then(() => refreshDriverPanel()) // تحديث يدوي فوري بعد الإجراء لراحة المستخدم
            .catch(err => console.error(err));
        }

        function completeOrder(orderId) {
            fetch(`${FIREBASE_URL}/${orderId}.json`, {
                method: 'PATCH',
                body: JSON.stringify({ status: "delivered" })
            })
            .then(() => refreshDriverPanel())
            .catch(err => console.error(err));
        }

        // 🔄 ميزة السحب للتحديث (Pull to Refresh) واجهة المندوب
        function initPullToRefresh() {
            let touchstartY = 0;
            let touchendY = 0;
            const driverPage = document.getElementById('driverPage');
            const indicator = document.getElementById('pullIndicator');

            driverPage.addEventListener('touchstart', e => {
                touchstartY = e.changedTouches[0].screenY;
            }, { passive: true });

            driverPage.addEventListener('touchmove', e => {
                let currentY = e.changedTouches[0].screenY;
                // إذا كان المندوب في أعلى الصفحة ويسحب لأسفل
                if (currentY - touchstartY > 50 && window.scrollY === 0) {
                    indicator.style.display = 'block';
                }
            }, { passive: true });

            driverPage.addEventListener('touchend', e => {
                touchendY = e.changedTouches[0].screenY;
                
                // إذا تجاوز السحب لأسفل مسافة 120 بكسل
                if (touchendY - touchstartY > 120 && window.scrollY === 0) {
                    indicator.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تحديث الطلبات...';
                    
                    // استدعاء دالة التحديث اليدوية
                    refreshDriverPanel();
                    
                    // إخفاء المؤشر بعد ثانية وإرجاع حالته الأصلية
                    setTimeout(() => {
                        indicator.style.display = 'none';
                        indicator.innerHTML = '<i class="fas fa-arrow-down"></i> اسحب أكثر للتحديث...';
                    }, 1000);
                } else {
                    indicator.style.display = 'none';
                }
            }, { passive: true });
        }
    </script>
</body>
</html>
