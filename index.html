<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>وصّال | Wassal - توصيل ومطاعم</title>
    
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      window.OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "30b64e58-99cf-4189-af4a-fc3e53b59b7a",
          allowLocalhostAsSecureOrigin: true
        });
      });

      // دالة طلب الإشعارات المحدثة للإصدار 16
      window.requestBrowserNotification = async function() {
        try {
          const OneSignal = window.OneSignal || window.OneSignalSDK;
          if (!OneSignal) return;
          const permission = await OneSignal.Notifications.permission;
          if (permission === 'default') {
            await OneSignal.Slidedown.promptPush(); 
          } else if (permission === 'denied') {
            window.showToast('تم حظر الإشعارات من المتصفح، يرجى تفعيلها من إعدادات الموقع');
          }
        } catch(e) { console.error("OneSignal Error:", e); }
      };
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        /* CSS الخاص بك بالكامل (نفسه) */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root { --primary-dark: #0a2b3e; --primary-light: #2dd4bf; }
        .notification-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 99999; display: flex; align-items: center; justify-content: center; }
        .notification-popup-card { background: white; padding: 30px; border-radius: 40px; text-align: center; width: 80%; }
        .enable-notif-btn { background: var(--primary-light); color: var(--primary-dark); padding: 15px 30px; border-radius: 30px; font-weight: 900; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <header class="app-header"><h1>وصّال | Wassal</h1></header>
    <script>
        // إظهار نافذة الإشعارات
        window.showNotificationPopupDirect = function() {
            if (document.getElementById('notificationPopup')) return;
            let popup = document.createElement('div');
            popup.className = 'notification-popup';
            popup.id = 'notificationPopup';
            popup.innerHTML = `
                <div class="notification-popup-card">
                    <h3>🔔 فعّل الإشعارات</h3>
                    <p>لتصلك تحديثات طلباتك فوراً</p>
                    <button class="enable-notif-btn" id="enableNotifBtn">تفعيل الإشعارات</button>
                    <button onclick="document.getElementById('notificationPopup').remove()">لاحقاً</button>
                </div>
            `;
            document.body.appendChild(popup);
            document.getElementById('enableNotifBtn').onclick = async () => {
                popup.remove();
                await window.requestBrowserNotification();
            };
        };

        // تشغيل تلقائي بعد ثانية
        setTimeout(window.showNotificationPopupDirect, 1000);
    </script>
</body>
</html>
