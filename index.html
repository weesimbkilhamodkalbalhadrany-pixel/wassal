    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #2dd4bf;
            --primary-dark: #14b8a6;
            --primary-light: #99f6e4;
            --bg-light: #f9fafb;
            --bg-dark: #0f172a;
            --card-light: #ffffff;
            --card-dark: #1e293b;
            --text-light: #1e293b;
            --text-dark: #f1f5f9;
            --text-muted: #64748b;
            --border-light: #e2e8f0;
            --border-dark: #334155;
            --danger: #ef4444;
            --success: #10b981;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg-light); color: var(--text-light); transition: 0.3s; }
        body.dark { background: var(--bg-dark); color: var(--text-dark); }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; background: inherit; }
        
        /* Header */
        .hero { background: linear-gradient(135deg, var(--primary-dark), #0f766e); padding: 28px 20px 60px; border-radius: 0 0 40px 40px; color: white; cursor: pointer; }
        .hero h1 { font-size: 2rem; font-weight: 800; }
        .hero p { font-size: 0.8rem; opacity: 0.9; margin-top: 6px; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 16px; left: 16px; right: 16px; max-width: 468px; margin: 0 auto; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); border-radius: 60px; display: flex; justify-content: space-around; padding: 8px 12px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.1); border: 1px solid rgba(255,255,255,0.3); }
        body.dark .bottom-nav { background: rgba(30,41,59,0.95); border-color: rgba(255,255,255,0.05); }
        .nav-item { text-align: center; padding: 6px 12px; border-radius: 40px; color: var(--text-muted); cursor: pointer; font-size: 0.7rem; font-weight: 600; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-item.active { background: var(--primary); color: white; box-shadow: 0 4px 10px rgba(45,212,191,0.4); }
        
        /* Pages */
        .page { display: none; padding: 20px 16px 90px; animation: fade 0.3s; }
        .active-page { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Cards & Buttons */
        .card { background: var(--card-light); border-radius: 24px; padding: 16px; margin-bottom: 16px; border: 1px solid var(--border-light); transition: 0.2s; cursor: pointer; }
        body.dark .card { background: var(--card-dark); border-color: var(--border-dark); }
        .card:active { transform: scale(0.98); }
        .btn-primary { background: linear-gradient(105deg, var(--primary), var(--primary-dark)); border: none; color: white; font-weight: 700; padding: 14px; border-radius: 40px; width: 100%; cursor: pointer; text-align: center; }
        .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); padding: 12px; border-radius: 40px; font-weight: 600; cursor: pointer; }
        .back-btn { display: inline-flex; align-items: center; gap: 6px; background: none; border: none; color: var(--primary); font-weight: 600; margin-bottom: 16px; cursor: pointer; }
        
        /* Grids */
        .resto-grid { display: flex; flex-direction: column; gap: 14px; }
        .resto-card { display: flex; gap: 14px; background: var(--card-light); border-radius: 24px; padding: 12px; border: 1px solid var(--border-light); cursor: pointer; }
        body.dark .resto-card { background: var(--card-dark); }
        .resto-img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; }
        .resto-info h3 { font-size: 1rem; font-weight: 800; }
        .resto-meta { font-size: 0.7rem; color: var(--text-muted); margin-top: 6px; }
        
        /* Menu items */
        .item-card { display: flex; justify-content: space-between; align-items: center; background: var(--card-light); border-radius: 20px; padding: 12px; margin-bottom: 12px; border: 1px solid var(--border-light); }
        .add-btn { background: var(--primary); width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: white; }
        
        /* Cart */
        .float-cart { position: fixed; bottom: 85px; left: 20px; right: 20px; background: var(--primary-dark); color: white; border-radius: 60px; padding: 12px 20px; display: none; justify-content: space-between; z-index: 150; cursor: pointer; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-light); }
        
        /* Tracking */
        .track-steps { display: flex; justify-content: space-between; margin: 30px 0; }
        .step { text-align: center; flex: 1; }
        .step .circle { width: 50px; height: 50px; background: var(--card-light); border-radius: 50%; margin: 0 auto 8px; display: flex; align-items: center; justify-content: center; border: 2px solid var(--border-light); }
        .step.active .circle { background: var(--primary); box-shadow: 0 0 0 6px rgba(45,212,191,0.2); animation: pulse 1.5s infinite; }
        .step.completed .circle { background: var(--success); border-color: var(--success); color: white; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(45,212,191,0.5); } 70% { box-shadow: 0 0 0 10px rgba(45,212,191,0); } 100% { box-shadow: 0 0 0 0 rgba(45,212,191,0); } }
        
        /* Map */
        .map-overlay { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #map { flex: 1; }
        .map-controls { display: flex; }
        .map-confirm, .map-back { flex: 1; padding: 20px; text-align: center; cursor: pointer; color: white; font-weight: bold; }
        .map-back { background: #475569; }
        .map-confirm { background: var(--primary); }
        
        /* Toast */
        .toast { position: fixed; bottom: -100px; left: 20px; right: 20px; background: #1f2937; color: white; padding: 14px; border-radius: 60px; text-align: center; z-index: 9999; transition: 0.2s; opacity: 0; }
        .toast.show { bottom: 120px; opacity: 1; }
        
        /* Login Overlay */
        .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .login-card { background: rgba(255,255,255,0.15); backdrop-filter: blur(20px); border-radius: 48px; padding: 32px; width: 90%; max-width: 360px; text-align: center; border: 1px solid rgba(255,255,255,0.3); }
        input { width: 100%; padding: 14px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: white; margin-bottom: 12px; }
        input::placeholder { color: rgba(255,255,255,0.7); }

        .admin-resto-item { background: var(--card-light); border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        body.dark .admin-resto-item { background: var(--card-dark); }

<script>

    const firebaseConfig = { apiKey: "AIzaSyCMb07oP2PMUdTlffJjYkbfThC34x1dbtU", authDomain: "waselny-2812b.firebaseapp.com", databaseURL: "https://waselny-2812b-default-rtdb.firebaseio.com", projectId: "waselny-2812b", storageBucket: "waselny-2812b.firebasestorage.app", messagingSenderId: "662536104158", appId: "1:662536104158:web:666db40942313724c3fa4f" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    // ---------- بيانات المطاعم الأساسية (18 مطعماً) ----------
    let restaurants = [
        { id: 1, name: "رويال بروستر", cat: "بروست", img: "https://images.unsplash.com/photo-1626645738196-c2a7c8d08f58?w=200", lat: 15.2851, lng: 44.2207, items: [{ n: "بروست 4 قطع", p: 3500 }, { n: "بروست 8 قطع", p: 6800 }, { n: "وجبة حراق", p: 3700 }, { n: "ساندوتش زنجر", p: 1800 }, { n: "بطاطس عائلي", p: 1200 }] },
        { id: 2, name: "البيك رويال", cat: "بروست", img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=200", lat: 15.291, lng: 44.225, items: [{ n: "وجبة مسحب", p: 3200 }, { n: "بروست حراق", p: 3600 }, { n: "ناجتس", p: 2500 }, { n: "برجر دبل", p: 2200 }] },

        { id: 4, name: "مطعم الشيباني", cat: "مأكولات", img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=200", lat: 15.305, lng: 44.218, items: [{ n: "عقدة لحم", p: 4000 }, { n: "شيش طاووق", p: 2500 }, { n: "مشاوي", p: 4800 }] },
        { id: 5, name: "مطعم روما", cat: "بيتزا", img: "https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=200", lat: 15.31, lng: 44.215, items: [{ n: "بيتزا جبن", p: 2500 }, { n: "بيتزا دجاج", p: 3500 }, { n: "برجر", p: 1200 }] },
        { id: 6, name: "نكهة زمان", cat: "لحوم", img: "https://images.unsplash.com/photo-1544025162-d76694265947?w=200", lat: 15.32, lng: 44.222, items: [{ n: "ذبيحة حنيذ", p: 8000 }, { n: "برجر لحم", p: 1100 }, { n: "سلتة", p: 1700 }] },

        { id: 8, name: "Juice City", cat: "عصائر", img: "https://images.unsplash.com/photo-1622484214888-a7c847b3b52e?w=200", lat: 15.34, lng: 44.205, items: [{ n: "بروست قطعتين", p: 1300 }, { n: "عصير بطيخ", p: 1000 }, { n: "ميلك شيك", p: 1000 }] },
        { id: 9, name: "Turkish House", cat: "مطبخ تركي", img: "https://images.unsplash.com/photo-1553621042-f6e147245754?w=200", lat: 15.35, lng: 44.2, items: [{ n: "كباب لحم", p: 2400 }, { n: "شيش طاووق", p: 2400 }, { n: "بيتزا جبن", p: 2000 }] },
        { id: 10, name: "Hot Spicy", cat: "وجبات حارة", img: "https://images.unsplash.com/photo-1534224039826-c7a0eda0e6b3?w=200", lat: 15.36, lng: 44.195, items: [{ n: "بروست عادي", p: 1300 }, { n: "بروست سبايسي", p: 1300 }, { n: "برجر حار", p: 1000 }] },

        { id: 12, name: "Al Andalus", cat: "عربي", img: "https://images.unsplash.com/photo-1517244683847-7456b63c5969?w=200", lat: 15.38, lng: 44.185, items: [{ n: "دجاج شواية", p: 550 }, { n: "دجاج مندي", p: 900 }, { n: "برمة لحم", p: 2700 }] },
        { id: 13, name: "Crispy Flavors", cat: "مقرمشات", img: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=200", lat: 15.39, lng: 44.18, items: [{ n: "تشكن فرايز", p: 1500 }, { n: "ساندوتش زنجر", p: 1200 }] },
        { id: 14, name: "Amin Pizza", cat: "بيتزا", img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=200", lat: 15.4, lng: 44.175, items: [{ n: "بيتزا تونة", p: 2200 }, { n: "بيتزا مارجريتا", p: 1900 }] },
        { id: 15, name: "قرية تهامية", cat: "شعبي", img: "https://images.unsplash.com/photo-1543352634-a1c51d9f1fa7?w=200", lat: 15.41, lng: 44.17, items: [{ n: "سلتة", p: 800 }, { n: "فحسة", p: 1500 }, { n: "لحم مضغوط", p: 2500 }] },
        { id: 16, name: "علم طه", cat: "شاورما", img: "https://images.unsplash.com/photo-1594221708779-94832f4320d1?w=200", lat: 15.42, lng: 44.165, items: [{ n: "شاورما عربي", p: 700 }, { n: "طبق شاورما", p: 2000 }] },
        { id: 17, name: "Joe La Yonsa", cat: "برجر", img: "https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=200", lat: 15.43, lng: 44.16, items: [{ n: "برجر دجاج", p: 1000 }, { n: "برجر لحم", p: 1000 }] },
        { id: 18, name: "Five Star Burger", cat: "برجر", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=200", lat: 15.44, lng: 44.155, items: [{ n: "برجر لحم", p: 1100 }, { n: "وجبة بروست", p: 1300 }] }
    ];
    function saveRestos() { localStorage.setItem('wassal_restos', JSON.stringify(restaurants)); }
    function loadRestos() { let saved = localStorage.getItem('wassal_restos'); if (saved) restaurants = JSON.parse(saved); else saveRestos(); }
    loadRestos();

    // ---------- متغيرات عامة ----------
    let currentUser = null, cart = [], currentResto = null, selectedAddress = null, userAddresses = [], couponDiscount = 0;
    let customerLatLng = null, deliveryCost = 0;
    let map, marker, currentMapMode = null, tempLocation = null, editingRestoId = null;
    let activeOrderId = null;
    const RESTAURANT_REF = { lat: 15.2851, lng: 44.2207 };
    const PRICE_KM = 180, MIN_DELIVERY = 550;

    function calculateDelivery(lat, lng) {
        if (!lat || !lng) return MIN_DELIVERY;
        const R = 6371;
        const dLat = (lat - RESTAURANT_REF.lat) * Math.PI / 180;
        const dLng = (lng - RESTAURANT_REF.lng) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(RESTAURANT_REF.lat * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLng/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        const dist = R * c;
        return Math.max(Math.round(dist * PRICE_KM), MIN_DELIVERY);
    }

    function showToast(msg) { let t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
        if (pageId === 'restosPage') renderAllRestos();
        if (pageId === 'homePage') renderHome();
        if (pageId === 'adminPage' && currentUser?.isAdmin) renderAdmin();
        if (pageId === 'cartPage') renderCartPage();
        if (pageId === 'ordersPage') renderPastOrders();
    }
    function setActiveNav(pageId) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active'); }

    // العرض الرئيسي
    function renderHome() {
        document.getElementById('servicesGrid').innerHTML = `
            <div class="card" onclick="showToast('خدمة التاكسي قريباً')"><div style="font-size: 2rem;">🚖</div><h3>تاكسي</h3></div>
            <div class="card" onclick="showToast('خدمة التوصيل قريباً')"><div style="font-size: 2rem;">📦</div><h3>توصيل طرود</h3></div>
        `;
    }
    function renderAllRestos() {
        let search = document.getElementById('searchResto')?.value.toLowerCase() || '';
        let cat = document.getElementById('catFilter')?.value || 'all';
        let filtered = restaurants.filter(r => r.name.toLowerCase().includes(search) && (cat === 'all' || r.cat === cat));
        document.getElementById('allRestosList').innerHTML = filtered.map(r => `
            <div class="resto-card" onclick="openResto(${r.id})">
                <img src="${r.img}" class="resto-img">
                <div class="resto-info"><h3>${r.name}</h3><div class="resto-meta">⭐ 4.4 • ${r.cat}</div></div>
            </div>
        `).join('');
    }
    window.openResto = (id) => {
        currentResto = restaurants.find(r => r.id === id);
        cart = [];
        updateCartUI();
        document.getElementById('menuContainer').innerHTML = `<h3>🍽️ ${currentResto.name}</h3><div style="margin-top: 16px;">${currentResto.items.map((item, idx) => `
            <div class="item-card">
                <div><strong>${item.n}</strong><br><span style="color: var(--primary); font-weight: bold;">${item.p} ريال</span></div>
                <div class="add-btn" onclick="addToCart(${idx})"><i class="fas fa-plus"></i></div>
            </div>
        `).join('')}</div>`;
        showPage('menuPage');
        updateCartPreview();
    };
    window.addToCart = (idx) => {
        let item = currentResto.items[idx];
        let existing = cart.find(i => i.n === item.n);
        if (existing) existing.qty++; else cart.push({ ...item, qty: 1 });
        updateCartUI();
        showToast(`➕ ${item.n}`);
    };
    function updateCartUI() {
        let total = cart.reduce((s, i) => s + i.p * i.qty, 0);
        let count = cart.reduce((s, i) => s + i.qty, 0);
        document.getElementById('cartCount').innerText = count;
        document.getElementById('cartTotalPrice').innerText = total;
        document.getElementById('floatCart').style.display = count ? 'flex' : 'none';
        updateCartPreview();
    }
    function updateCartPreview() {
        let total = cart.reduce((s, i) => s + i.p * i.qty, 0);
        document.getElementById('cartPreview').innerHTML = cart.length ? `<div class="card">🛒 ${cart.length} أصناف | ${total} ريال <i class="fas fa-chevron-left"></i></div>` : '';
    }
    function renderCartPage() {
        if (!currentUser) return;
        document.getElementById('cartItems').innerHTML = cart.map((i, idx) => `<div class="cart-item"><div><b>${i.n}</b> x${i.qty}</div><div>${i.p*i.qty} ريال <button onclick="removeItem(${idx})" style="background: var(--danger); border: none; padding: 4px 10px; border-radius: 30px; color: white;">حذف</button></div></div>`).join('') || '<p>السلة فارغة</p>';
        document.getElementById('addressesList').innerHTML = userAddresses.map((addr, idx) => `<div class="cart-item" style="cursor: pointer;" onclick="selectAddress('${addr}')"><div>${selectedAddress === addr ? '✅' : '📍'} ${addr}</div></div>`).join('');
        if (!userAddresses.length) userAddresses = ["المنزل - صنعاء"];
        if (!selectedAddress) selectedAddress = userAddresses[0];
        let subtotal = cart.reduce((s, i) => s + i.p * i.qty, 0);
        let finalDelivery = customerLatLng ? calculateDelivery(customerLatLng.lat, customerLatLng.lng) : MIN_DELIVERY;
        deliveryCost = finalDelivery;
        document.getElementById('deliveryInfo').innerHTML = `<div class="card">🚚 رسوم التوصيل: ${finalDelivery} ريال</div>`;
        let total = subtotal + finalDelivery - couponDiscount;
        document.getElementById('totalSummary').innerHTML = `<div class="card"><div>المجموع: ${subtotal} ريال</div><div>التوصيل: ${finalDelivery} ريال</div><div>الخصم: -${couponDiscount} ريال</div><div style="font-weight: 800;">الإجمالي: ${total} ريال</div></div>`;
    }
    window.removeItem = (idx) => { cart.splice(idx,1); updateCartUI(); renderCartPage(); };
    window.selectAddress = (addr) => { selectedAddress = addr; renderCartPage(); };
    document.getElementById('addAddressBtn').onclick = () => { document.getElementById('addressModal').style.display = 'flex'; };
    document.getElementById('saveAddress').onclick = () => { let addr = document.getElementById('newAddress').value.trim(); if(addr && !userAddresses.includes(addr)) { userAddresses.push(addr); if(!selectedAddress) selectedAddress=addr; saveUserData(); renderCartPage(); showToast("تمت الإضافة"); } document.getElementById('addressModal').style.display = 'none'; document.getElementById('newAddress').value=''; };
    document.getElementById('cancelAddress').onclick = () => { document.getElementById('addressModal').style.display = 'none'; };
    document.getElementById('applyCoupon').onclick = () => { let code = document.getElementById('couponInput').value; if(code === 'WELCOME10' && couponDiscount===0) { couponDiscount=15; showToast("خصم 15 ريال"); renderCartPage(); } else showToast("كود غير صالح"); };
    document.getElementById('confirmOrder').onclick = async () => {
        if(!cart.length) return showToast("السلة فارغة");
        if(!selectedAddress) return showToast("اختر عنواناً");
        if(!customerLatLng) return showToast("حدد موقعك أولاً");
        let subtotal = cart.reduce((s,i)=>s+i.p*i.qty,0);
        let finalDelivery = deliveryCost;
        let total = subtotal + finalDelivery - couponDiscount;
        let order = { id: Date.now(), restaurant: currentResto.name, items: cart, address: selectedAddress, customerLocation: customerLatLng, total, deliveryCost: finalDelivery, status: 'pending', customer: currentUser.phone, createdAt: new Date().toISOString() };
        await db.ref('orders/'+order.id).set(order);
        activeOrderId = order.id;
        localStorage.setItem('activeOrder', activeOrderId);
        showToast("✅ تم إرسال الطلب");
        cart = []; couponDiscount=0; updateCartUI();
        showPage('homePage'); setActiveNav('homePage');
        trackCurrentOrder();
    };
    window.trackCurrentOrder = async () => {
        let id = localStorage.getItem('activeOrder');
        if(!id) return showToast("لا طلب نشط");
        let snap = await db.ref('orders/'+id).once('value');
        let o = snap.val();
        if(!o) return;
        const steps = ['pending','on_the_way','arrived','delivered'];
        let idx = steps.indexOf(o.status);
        let html = `<div class="track-steps">${steps.map((s,i)=>{ let cls = i<idx ? 'completed' : i===idx ? 'active' : ''; let icon = {pending:'fa-clock',on_the_way:'fa-truck',arrived:'fa-map-marker-alt',delivered:'fa-check-circle'}[s]; return `<div class="step ${cls}"><div class="circle"><i class="fas ${icon}"></i></div><div>${s==='pending'?'قيد المراجعة':s==='on_the_way'?'في الطريق':s==='arrived'?'وصل الموقع':'تم التوصيل'}</div></div>`; }).join('')}</div><div class="card"><p>🍽️ ${o.restaurant}</p><p>📍 ${o.address}</p><p>💰 ${o.total} ريال</p></div>`;
        document.getElementById('trackingContent').innerHTML = html;
        showPage('trackingPage');
        let interval = setInterval(async () => {
            let snap2 = await db.ref('orders/'+id).once('value');
            let newO = snap2.val();
            if(newO && document.getElementById('trackingPage').classList.contains('active-page')) {
                let newIdx = steps.indexOf(newO.status);
                if(newIdx !== idx) {
                    idx = newIdx;
                    document.getElementById('trackingContent').innerHTML = `<div class="track-steps">${steps.map((s,i)=>{ let cls = i<newIdx ? 'completed' : i===newIdx ? 'active' : ''; let icon = {pending:'fa-clock',on_the_way:'fa-truck',arrived:'fa-map-marker-alt',delivered:'fa-check-circle'}[s]; return `<div class="step ${cls}"><div class="circle"><i class="fas ${icon}"></i></div><div>${s==='pending'?'قيد المراجعة':s==='on_the_way'?'في الطريق':s==='arrived'?'وصل الموقع':'تم التوصيل'}</div></div>`; }).join('')}</div><div class="card"><p>🍽️ ${newO.restaurant}</p><p>📍 ${newO.address}</p><p>💰 ${newO.total} ريال</p></div>`;
                    showToast(`تم التحديث: ${steps[newIdx]}`);
                }
            }
        }, 3000);
        window._trackInterval = interval;
    };
    function renderPastOrders() { document.getElementById('pastOrders').innerHTML = '<p>لا توجد طلبات</p>'; }

    // Admin functions
    function renderAdmin() {
        document.getElementById('adminRestosList').innerHTML = restaurants.map(r => `
            <div class="admin-resto-item">
                <div><b>${r.name}</b><br><small>${r.cat} | ${r.lat},${r.lng}</small></div>
                <div><button onclick="editResto(${r.id})" style="background: var(--primary); border: none; padding: 6px 12px; border-radius: 30px; color: white;">تعديل</button>
                <button onclick="deleteResto(${r.id})" style="background: var(--danger); border: none; padding: 6px 12px; border-radius: 30px; color: white;">حذف</button></div>
            </div>
        `).join('');
    }
    window.deleteResto = (id) => { if(confirm("حذف المطعم؟")) { restaurants = restaurants.filter(r=>r.id!==id); saveRestos(); renderAdmin(); renderAllRestos(); renderHome(); showToast("تم الحذف"); } };
    window.editResto = (id) => {
        let resto = restaurants.find(r=>r.id===id);
        if(!resto) return;
        let newName = prompt("اسم جديد", resto.name); if(newName) resto.name = newName;
        let newCat = prompt("تصنيف جديد", resto.cat); if(newCat) resto.cat = newCat;
        let newImg = prompt("رابط صورة", resto.img); if(newImg) resto.img = newImg;
        if(confirm("تعديل موقع المطعم؟")) {
            editingRestoId = id;
            currentMapMode = 'editResto';
            document.getElementById('mapOverlay').style.display = 'flex';
            setTimeout(() => {
                if(!map) { map = L.map('map').setView([resto.lat, resto.lng], 14); L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']}).addTo(map); marker = L.marker([resto.lat, resto.lng],{draggable:true}).addTo(map); map.on('click',e=>marker.setLatLng(e.latlng)); }
                else { map.setView([resto.lat, resto.lng],14); marker.setLatLng([resto.lat, resto.lng]); }
                map.invalidateSize();
            },100);
        }
        let itemsStr = resto.items.map(i=>`${i.n}:${i.p}`).join(',');
        let newItems = prompt("الأصناف (اسم:سعر, مفصولة بفاصلة)", itemsStr);
        if(newItems) { let arr = newItems.split(',').map(it=>{ let p=it.split(':'); return {n:p[0].trim(), p:parseFloat(p[1])}; }).filter(i=>!isNaN(i.p)); if(arr.length) resto.items = arr; }
        saveRestos(); renderAdmin(); renderAllRestos(); renderHome(); showToast("تم التحديث");
    };
    document.getElementById('pickRestoLocation').onclick = () => {
        currentMapMode = 'newResto';
        document.getElementById('mapOverlay').style.display = 'flex';
        setTimeout(() => {
            if(!map) { map = L.map('map').setView([15.3694,44.1910],13); L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']}).addTo(map); marker = L.marker([15.3694,44.1910],{draggable:true}).addTo(map); map.on('click',e=>marker.setLatLng(e.latlng)); }
            else { map.setView([15.3694,44.1910],13); marker.setLatLng([15.3694,44.1910]); }
            map.invalidateSize();
        },100);
    };
    document.getElementById('addRestoBtn').onclick = () => {
        let name = document.getElementById('newName').value.trim();
        let cat = document.getElementById('newCat').value.trim();
        let img = document.getElementById('newImg').value.trim();
        let lat = parseFloat(document.getElementById('newLat').value);
        let lng = parseFloat(document.getElementById('newLng').value);
        let itemsText = document.getElementById('newItems').value;
        if(!name||!cat||!img||isNaN(lat)||isNaN(lng)) return showToast("املأ الحقول وحدد الموقع");
        let items = itemsText.split(',').map(i=>{ let p=i.split(':'); return {n:p[0].trim(), p:parseFloat(p[1])}; }).filter(i=>!isNaN(i.p));
        if(!items.length) return showToast("أدخل أصنافاً بصيغة اسم:سعر");
        let newId = Date.now();
        restaurants.push({id:newId, name, cat, img, lat, lng, items});
        saveRestos();
        renderAdmin(); renderAllRestos(); renderHome();
        showToast("✅ تمت الإضافة");
        document.getElementById('newName').value=''; document.getElementById('newCat').value=''; document.getElementById('newImg').value='';
        document.getElementById('newLat').value=''; document.getElementById('newLng').value=''; document.getElementById('newItems').value='';
    };

    // Map Functions
    function openLocationPicker() { currentMapMode='customer'; document.getElementById('mapOverlay').style.display='flex'; setTimeout(()=>{ if(!map){ map = L.map('map').setView([15.3694,44.1910],13); L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']}).addTo(map); marker = L.marker([15.3694,44.1910],{draggable:true}).addTo(map); map.on('click',e=>marker.setLatLng(e.latlng)); } else { map.setView([15.3694,44.1910],13); marker.setLatLng([15.3694,44.1910]); } map.invalidateSize(); },100); }
    window.confirmMapLocation = () => {
        if(!marker) return;
        let pos = marker.getLatLng();
        if(currentMapMode === 'customer') {
            customerLatLng = { lat: pos.lat, lng: pos.lng };
            document.getElementById('userLocationText').innerHTML = `📍 ${pos.lat.toFixed(4)}, ${pos.lng.toFixed(4)}`;
            renderCartPage();
            closeMap();
            showToast("تم تحديد موقع التوصيل");
        } else if(currentMapMode === 'newResto') {
            document.getElementById('newLat').value = pos.lat;
            document.getElementById('newLng').value = pos.lng;
            closeMap();
            showToast("تم تحديد موقع المطعم");
        } else if(currentMapMode === 'editResto' && editingRestoId) {
            let resto = restaurants.find(r=>r.id===editingRestoId);
            if(resto) { resto.lat = pos.lat; resto.lng = pos.lng; saveRestos(); renderAdmin(); showToast("تم تحديث موقع المطعم"); }
            closeMap();
        }
    };
    window.closeMap = () => { document.getElementById('mapOverlay').style.display = 'none'; currentMapMode = null; };

    // User data & Login
    function saveUserData() { if(currentUser) localStorage.setItem(`wassal_${currentUser.phone}`, JSON.stringify({ addresses: userAddresses, selectedAddress })); }
    function loadUserData() { let data = localStorage.getItem(`wassal_${currentUser?.phone}`); if(data) { let d = JSON.parse(data); userAddresses = d.addresses || ["المنزل - صنعاء"]; selectedAddress = d.selectedAddress || userAddresses[0]; } else { userAddresses = ["المنزل - صنعاء"]; selectedAddress = userAddresses[0]; } renderCartPage(); }
    document.getElementById('loginBtn').onclick = () => { let name = document.getElementById('loginName').value.trim(); let phone = document.getElementById('loginPhone').value.trim(); if(!name||!phone) return showToast("أدخل الاسم والرقم"); currentUser = { name, phone, isAdmin: false }; localStorage.setItem('wassal_user', JSON.stringify(currentUser)); loadUserData(); document.getElementById('loginOverlay').style.display = 'none'; showPage('homePage'); renderHome(); showToast(`أهلاً ${name}`); };
    let adminClicks = 0;
    document.getElementById('heroTrigger').onclick = () => { adminClicks++; setTimeout(()=>adminClicks=0,800); if(adminClicks>=5){ let pwd = prompt("كلمة سر المدير"); if(pwd === "weesim73741") { currentUser = { name:"مدير", phone:"admin", isAdmin: true }; localStorage.setItem('wassal_user', JSON.stringify(currentUser)); document.getElementById('loginOverlay').style.display = 'none'; showPage('adminPage'); renderAdmin(); } else showToast("خطأ"); adminClicks=0; } };
    document.getElementById('darkModeToggle').onclick = () => { document.body.classList.toggle('dark'); let icon = document.getElementById('darkIcon'); icon.className = document.body.classList.contains('dark') ? 'fas fa-toggle-on' : 'fas fa-toggle-off'; localStorage.setItem('darkMode', document.body.classList.contains('dark')); };
    if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('wassal_user'); location.reload(); };
    document.querySelectorAll('.nav-item').forEach(nav => nav.onclick = () => { let page = nav.dataset.page; if(page === 'adminPage' && !currentUser?.isAdmin) return showToast("غير مصرح"); showPage(page); setActiveNav(page); });
    document.getElementById('viewCartBtn').onclick = () => { if(cart.length===0) showToast("السلة فارغة"); else showPage('cartPage'); };
    let cats = [...new Set(restaurants.map(r=>r.cat))]; document.getElementById('catFilter').innerHTML = '<option value="all">الكل</option>' + cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    document.getElementById('searchResto').addEventListener('input', ()=>renderAllRestos());
    document.getElementById('catFilter').addEventListener('change', ()=>renderAllRestos());
    let savedUser = localStorage.getItem('wassal_user');
    if(savedUser) { currentUser = JSON.parse(savedUser); if(currentUser.isAdmin) { document.getElementById('loginOverlay').style.display = 'none'; showPage('adminPage'); renderAdmin(); } else { document.getElementById('loginOverlay').style.display = 'none'; showPage('homePage'); renderHome(); loadUserData(); if(localStorage.getItem('activeOrder')) document.getElementById('trackHomeBtn').style.display = 'block'; } } else document.getElementById('loginOverlay').style.display = 'flex';
    renderAllRestos(); renderHome();
</script>
</body>
</html>
