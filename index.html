<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>وصّال | Wassal - إشعارات فورية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.2/firebase-messaging-compat.js"></script>
    <style>
        /* أنماط مختصرة لكنها تغطي كل الأساسيات */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root { --primary-dark: #0a2b3e; --primary-light: #2dd4bf; --bg-light: #f8fafc; --card-light: #ffffff; --text-light: #1e293b; --danger: #ef4444; --success: #10b981; --restaurant-accent: #f97316; }
        body { background: var(--bg-light); color: var(--text-light); }
        .app-header { background: linear-gradient(135deg, var(--primary-dark), #1a4f6e); color: white; padding: 20px 24px 32px; border-radius: 0 0 48px 48px; text-align: center; }
        .logo-area h1 { font-size: 2.2rem; font-weight: 900; }
        .categories-scroll { display: flex; gap: 12px; overflow-x: auto; padding: 15px 20px; margin-top: -30px; }
        .category-item { min-width: 100px; background: white; padding: 15px 10px; border-radius: 22px; text-align: center; cursor: pointer; border: 2px solid transparent; }
        .category-item.active { border-color: var(--primary-light); background: #f0fdfa; }
        .services-grid, .restaurants-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin: 10px 0; }
        .service-card, .restaurant-card { background: var(--card-light); border-radius: 28px; padding: 24px 12px; text-align: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .btn-send { width: 100%; padding: 16px; background: var(--primary-light); border: none; border-radius: 44px; font-weight: 900; font-size: 1.1rem; cursor: pointer; margin-top: 16px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #ddd; }
        .nav-item { text-align: center; flex: 1; color: gray; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        .page { display: none; }
        .active-page { display: block; }
        .toast { position: fixed; top: -100px; left: 20px; right: 20px; background: var(--success); color: white; padding: 16px; border-radius: 30px; text-align: center; z-index: 9999; transition: top 0.3s; }
        .toast.show { top: 20px; }
        .login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a2b3e; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        .login-card { background: white; border-radius: 48px; padding: 32px; width: 90%; max-width: 380px; text-align: center; }
        .role-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-btn { flex: 1; padding: 10px; border-radius: 30px; background: #e2e8f0; cursor: pointer; }
        .role-btn.active { background: var(--primary-light); color: white; }
        input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 30px; border: 1px solid #ccc; }
        .order-card, .restaurant-menu-card { background: white; border-radius: 32px; padding: 24px; margin-bottom: 20px; }
        .menu-item-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>

<header class="app-header">
    <div class="logo-area"><h1>وصّال | Wassal</h1><div class="slogan">إشعارات فورية - مشروع جديد</div></div>
</header>

<div class="categories-scroll" id="categoriesScroll">
    <div class="category-item active" data-category="restaurants"><i class="fas fa-utensils"></i><span>المطاعم</span></div>
    <div class="category-item" data-category="delivery"><i class="fas fa-motorcycle"></i><span>التوصيل</span></div>
    <div class="category-item" data-category="market"><i class="fas fa-shopping-basket"></i><span>سوبر ماركت</span></div>
</div>

<main>
    <div id="homePage" class="page active-page">
        <h3 id="sectionTitle" style="margin-bottom:15px;">🍕 المطاعم</h3>
        <div class="services-grid" id="dynamicGrid"></div>
        <button id="enableNotificationsBtn" class="btn-send">🔔 تفعيل الإشعارات</button>
        <button id="trackOrderBtnHome" class="btn-send" style="display:none;">📍 تتبع طلبي</button>
    </div>
    <div id="ordersPage" class="page"><div class="order-card">قائمة الطلبات قيد التطوير</div></div>
    <div id="settingsPage" class="page"><div class="order-card"><button id="logoutBtn" class="btn-send">تسجيل الخروج</button></div></div>
    <div id="restaurantMenuPage" class="page"><div id="restaurantMenuContainer"></div></div>
    <div id="invoicePage" class="page"><div id="invoiceContainer"></div></div>
</main>

<nav class="bottom-nav">
    <div class="nav-item active" data-page="homePage"><i class="fas fa-home"></i><span>الرئيسية</span></div>
    <div class="nav-item" data-page="ordersPage"><i class="fas fa-list-ul"></i><span>طلباتي</span></div>
    <div class="nav-item" data-page="settingsPage"><i class="fas fa-cog"></i><span>الإعدادات</span></div>
</nav>

<div id="toastMsg" class="toast"></div>
<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h3>وصّال | Wassal</h3>
        <div class="role-buttons"><div class="role-btn active" data-role="customer">عميل</div><div class="role-btn" data-role="driver">مندوب</div></div>
        <input type="text" id="customerName" placeholder="الاسم بالعربي"><input type="tel" id="loginPhone" placeholder="رقم الهاتف">
        <input type="text" id="driverName" placeholder="الاسم (للمندوب)" style="display:none;"><input type="password" id="loginPassword" placeholder="كلمة السر" style="display:none;">
        <button id="loginBtn" class="btn-send">دخول</button>
    </div>
</div>

<script>
    // ======================= إعدادات Firebase الجديدة =======================
    const firebaseConfig = {
        apiKey: 'AIzaSyBvnmHgNIm4Xs-d-LBQo02BTPGxm_FZsrk',
        authDomain: 'wassal-app-final.firebaseapp.com',
        projectId: 'wassal-app-final',
        storageBucket: 'wassal-app-final.firebasestorage.app',
        messagingSenderId: '110183430414',
        appId: '1:110183430414:web:e4b8e88e31e91a0f61ff5f'
    };
    const vapidKey = 'BE5Xx_uW2FKp76SMJe9Sul5CkBi2-0mwktJgg-yP9wqWe2Avw-kWxdc9xuIE0sh5FXLaFffFCgEwEacggCh7VzQ';
    
    firebase.initializeApp(firebaseConfig);
    const messaging = firebase.messaging();
    
    // دالة طلب الإذن والحصول على التوكن
    async function requestNotificationPermission() {
        try {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                const token = await messaging.getToken({ vapidKey: vapidKey });
                console.log('✅ FCM Token:', token);
                // حفظ التوكن في Realtime Database (اختياري)
                if (currentUser && currentUser.phone) {
                    await fetch(`https://wassal-app-final-default-rtdb.firebaseio.com/users/${currentUser.phone}/fcm_token.json`, {
                        method: 'PUT',
                        body: JSON.stringify(token)
                    });
                }
                showToast('✅ تم تفعيل الإشعارات بنجاح');
                return token;
            } else {
                showToast('⚠️ لم يتم منح الإذن');
                return null;
            }
        } catch (err) {
            console.error(err);
            showToast('❌ فشل تفعيل الإشعارات: ' + err.message);
        }
    }
    
    // استقبال الإشعارات أثناء فتح التطبيق
    messaging.onMessage((payload) => {
        showToast(`${payload.notification.title}: ${payload.notification.body}`);
    });
    
    // ======================= دوال التطبيق الأساسية =======================
    let currentUser = null;
    const DRIVER_PASSWORD = "weesim73741";
    let currentCategory = 'restaurants';
    
    function showToast(msg) {
        let t = document.getElementById('toastMsg');
        t.innerText = msg;
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 3000);
    }
    function tab(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(pageId).classList.add('active-page');
    }
    function setActiveNav(pageId) {
        document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
        document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active');
    }
    
    // بيانات المطاعم التجريبية
    const wassalRestaurants = [
        { id: 1, name: "رويال بروستر", category: "بروست", items: [{n:"بروست 4 قطع",p:3500},{n:"بطاطس",p:1200}] },
        { id: 2, name: "شاورما هت", category: "شاورما", items: [{n:"شاورما دجاج",p:1200}] }
    ];
    
    function renderDynamicGrid() {
        const grid = document.getElementById('dynamicGrid');
        const title = document.getElementById('sectionTitle');
        if(!grid) return;
        grid.innerHTML = '';
        if(currentCategory === 'restaurants') {
            title.innerHTML = '🍕 المطاعم';
            wassalRestaurants.forEach(r => {
                grid.innerHTML += `<div class="restaurant-card" onclick="openRestaurantMenu(${r.id})"><div class="service-icon"><i class="fas fa-utensils"></i></div><h3>${r.name}</h3></div>`;
            });
        } else if(currentCategory === 'delivery') {
            title.innerHTML = '🛵 خدمة التوصيل';
            grid.innerHTML = `<div class="service-card" onclick="alert('خدمة التوصيل قيد التطوير')"><div class="service-icon">🚖</div><h3>تاكسي</h3></div>`;
        } else if(currentCategory === 'market') {
            title.innerHTML = '🛒 سوبر ماركت';
            grid.innerHTML = `<div class="service-card" onclick="alert('سوبر ماركت قيد التطوير')"><div class="service-icon">🏢</div><h3>خير زمان</h3></div>`;
        }
    }
    
    window.openRestaurantMenu = function(restId) {
        if(currentUser?.role !== 'customer') { showToast("الرجاء تسجيل الدخول كعميل"); return; }
        let restaurant = wassalRestaurants.find(r => r.id === restId);
        let html = `<h2>${restaurant.name}</h2><div class="menu-items-list">`;
        restaurant.items.forEach(item => {
            html += `<div class="menu-item-row"><span>${item.n}</span><span>${Math.round(item.p/1000)} ريال</span><button class="btn-send" style="width:auto; padding:8px 16px; margin-top:0;" onclick="showToast('تمت الإضافة')">➕ أضف</button></div>`;
        });
        html += `<button class="btn-send" onclick="tab('homePage')">🔙 رجوع</button></div>`;
        document.getElementById('restaurantMenuContainer').innerHTML = html;
        tab('restaurantMenuPage');
    };
    
    function switchCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.category-item').forEach(item => {
            if(item.dataset.category === cat) item.classList.add('active');
            else item.classList.remove('active');
        });
        renderDynamicGrid();
        tab('homePage');
        setActiveNav('homePage');
    }
    
    // تسجيل الدخول
    function handleLogin() {
        let role = document.querySelector('.role-btn.active').dataset.role;
        if(role === 'customer') {
            let name = document.getElementById('customerName').value.trim();
            let phone = document.getElementById('loginPhone').value.trim();
            if(!name || !phone) { showToast("أدخل الاسم والهاتف"); return; }
            currentUser = { role:'customer', name, phone };
            localStorage.setItem('wassalUser', JSON.stringify(currentUser));
            document.getElementById('loginOverlay').style.display = 'none';
            document.querySelector('main').style.display = 'block';
            document.querySelector('.categories-scroll').style.display = 'flex';
            document.querySelector('.bottom-nav').style.display = 'flex';
            document.querySelector('.app-header').style.display = 'block';
            showToast(`مرحباً ${name}`);
            switchCategory('restaurants');
        } else if(role === 'driver') {
            let name = document.getElementById('driverName').value.trim();
            let pwd = document.getElementById('loginPassword').value.trim();
            if(!name || pwd !== DRIVER_PASSWORD) { showToast("بيانات المندوب غير صحيحة"); return; }
            currentUser = { role:'driver', name };
            localStorage.setItem('wassalUser', JSON.stringify(currentUser));
            document.getElementById('loginOverlay').style.display = 'none';
            document.querySelector('main').style.display = 'block';
            document.querySelector('.categories-scroll').style.display = 'flex';
            document.querySelector('.bottom-nav').style.display = 'flex';
            document.querySelector('.app-header').style.display = 'block';
            showToast(`مرحباً مندوب ${name}`);
            tab('ordersPage');
            setActiveNav('ordersPage');
        }
    }
    
    // ربط الأحداث
    document.getElementById('loginBtn').addEventListener('click', handleLogin);
    document.getElementById('enableNotificationsBtn').addEventListener('click', requestNotificationPermission);
    document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('wassalUser'); location.reload(); });
    document.querySelectorAll('.role-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.role-btn').forEach(r => r.classList.remove('active'));
            btn.classList.add('active');
            let isDriver = btn.dataset.role === 'driver';
            document.getElementById('customerName').style.display = isDriver ? 'none' : 'block';
            document.getElementById('loginPhone').style.display = isDriver ? 'none' : 'block';
            document.getElementById('driverName').style.display = isDriver ? 'block' : 'none';
            document.getElementById('loginPassword').style.display = isDriver ? 'block' : 'none';
        });
    });
    document.querySelectorAll('.nav-item').forEach(nav => {
        nav.addEventListener('click', () => { let page = nav.dataset.page; if(page) { tab(page); setActiveNav(page); } });
    });
    document.querySelectorAll('.category-item').forEach(cat => {
        cat.addEventListener('click', () => switchCategory(cat.dataset.category));
    });
    
    // استعادة الجلسة
    if(localStorage.getItem('wassalUser')) {
        currentUser = JSON.parse(localStorage.getItem('wassalUser'));
        document.getElementById('loginOverlay').style.display = 'none';
        document.querySelector('main').style.display = 'block';
        document.querySelector('.categories-scroll').style.display = 'flex';
        document.querySelector('.bottom-nav').style.display = 'flex';
        document.querySelector('.app-header').style.display = 'block';
        switchCategory('restaurants');
    } else {
        document.querySelector('main').style.display = 'none';
        document.querySelector('.categories-scroll').style.display = 'none';
        document.querySelector('.bottom-nav').style.display = 'none';
        document.querySelector('.app-header').style.display = 'none';
    }
</script>
</body>
</html>
