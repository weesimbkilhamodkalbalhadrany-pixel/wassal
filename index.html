<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>وصّال - تفعيل الإشعارات</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
    <script>
        window.OneSignalDeferred = window.OneSignalDeferred || [];
        OneSignalDeferred.push(async function(OneSignal) {
            await OneSignal.init({
                appId: "30b64e58-99cf-4189-af4a-fc3e53b59b7a",
            });
            
            // التحقق من الحالة
            const permission = await OneSignal.Notifications.permission;
            if (permission === "granted") {
                document.getElementById('status').innerHTML = '✅ الإشعارات مفعلة';
                document.getElementById('status').style.color = 'green';
            } else {
                document.getElementById('status').innerHTML = '⚠️ الإشعارات غير مفعلة';
                document.getElementById('subscribeBtn').style.display = 'block';
            }
        });
        
        function subscribe() {
            window.OneSignalDeferred.push(async function(OneSignal) {
                await OneSignal.Slidedown.promptPush();
            });
        }
    </script>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; background: #0a2b3e; }
        .card { background: white; border-radius: 30px; padding: 40px; max-width: 400px; margin: auto; }
        button { background: #2dd4bf; border: none; padding: 15px 30px; border-radius: 50px; font-size: 1.2rem; font-weight: bold; margin: 20px; cursor: pointer; }
        #subscribeBtn { display: none; background: #f59e0b; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔔 وصّال</h1>
        <p id="status">جاري التحميل...</p>
        <button id="subscribeBtn" onclick="subscribe()">📢 تفعيل الإشعارات</button>
        <p style="font-size: 0.8rem; margin-top: 20px;">اضغط الزر واختر "سماح"</p>
    </div>
</body>
</html>
