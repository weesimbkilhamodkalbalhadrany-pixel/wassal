<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>وصّال | Wassal - تجربة توصيل عالمية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #FF6B2C;
            --primary-dark: #E55A1F;
            --primary-light: #FF9F6E;
            --dark-bg: #0F172A;
            --light-bg: #F8FAFE;
            --card-white: #FFFFFF;
            --card-dark: #1E293B;
            --text-dark: #1E293B;
            --text-light: #F1F5F9;
            --text-muted: #64748B;
            --border-light: #EFF2F9;
            --border-dark: #334155;
            --shadow-sm: 0 4px 12px rgba(0,0,0,0.05);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.08);
            --radius-xl: 32px;
            --radius-lg: 24px;
            --transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }
        body { font-family: 'Inter', sans-serif; background: var(--light-bg); color: var(--text-dark); transition: var(--transition); }
        body.dark { background: var(--dark-bg); color: var(--text-light); --card-white: var(--card-dark); --border-light: var(--border-dark); --light-bg: var(--dark-bg); }
        .app-container { max-width: 500px; margin: 0 auto; background: var(--light-bg); min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.05); }
        
        /* Header & Navigation */
        .app-header { background: linear-gradient(135deg, var(--primary-dark), #1E2A3E); padding: 24px 20px 32px; border-radius: 0 0 40px 40px; color: white; cursor: pointer; }
        .logo { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, var(--primary-light)); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .slogan { font-size: 0.75rem; opacity: 0.8; margin-top: 5px; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 500px; margin: 0 auto; background: var(--card-white); backdrop-filter: blur(20px); border-top: 1px solid var(--border-light); display: flex; justify-content: space-around; padding: 10px 16px 22px; z-index: 300; }
        .nav-item { text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: var(--transition); }
        .nav-item i { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--primary); }
        
        /* Pages */
        .page { display: none; padding: 20px 16px 80px; animation: fadeSlide 0.3s ease; }
        .active-page { display: block; }
        @keyframes fadeSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Buttons & Cards */
        .btn-primary { background: linear-gradient(105deg, var(--primary), var(--primary-dark)); border: none; color: white; font-weight: 700; padding: 14px 24px; border-radius: 60px; cursor: pointer; transition: var(--transition); width: 100%; font-size: 1rem; box-shadow: 0 4px 12px rgba(255,107,44,0.3); }
        .btn-primary:active { transform: scale(0.97); }
        .btn-outline { background: transparent; border: 1.5px solid var(--primary); color: var(--primary); padding: 12px 20px; border-radius: 60px; font-weight: 600; cursor: pointer; transition: var(--transition); }
        .card { background: var(--card-white); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; border: 1px solid var(--border-light); transition: var(--transition); cursor: pointer; }
        .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
        .ripple { position: relative; overflow: hidden; cursor: pointer; }
        .ripple:active::after { content: ''; position: absolute; top: 50%; left: 50%; width: 100%; height: 100%; background: rgba(255,255,255,0.3); border-radius: 50%; transform: translate(-50%, -50%) scale(0); animation: ripple 0.4s ease-out; }
        @keyframes ripple { to { transform: translate(-50%, -50%) scale(4); opacity: 0; } }
        
        /* Restaurant Grid */
        .restaurants-grid { display: flex; flex-direction: column; gap: 16px; }
        .res-card { display: flex; gap: 14px; background: var(--card-white); border-radius: 24px; padding: 12px; border: 1px solid var(--border-light); cursor: pointer; transition: var(--transition); }
        .res-img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; }
        .res-info h3 { font-size: 1.1rem; font-weight: 800; }
        .res-meta { display: flex; gap: 12px; margin-top: 6px; font-size: 0.7rem; color: var(--text-muted); }
        .badge-open { background: #10b98120; color: #10b981; padding: 4px 10px; border-radius: 30px; font-size: 0.7rem; }
        
        /* Menu Items */
        .menu-grid { display: grid; gap: 12px; margin-top: 20px; }
        .item-card { background: var(--card-white); border-radius: 20px; display: flex; align-items: center; padding: 12px; gap: 12px; border: 1px solid var(--border-light); }
        .item-img { width: 70px; height: 70px; border-radius: 16px; object-fit: cover; }
        .item-details h4 { font-weight: 700; font-size: 1rem; }
        .price { color: var(--primary); font-weight: 800; margin-top: 4px; }
        .add-btn { background: var(--primary); color: white; width: 44px; height: 44px; border-radius: 14px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; font-size: 1.2rem; transition: 0.1s; }
        .add-btn:active { transform: scale(0.9); }
        
        /* Cart Floating */
        .float-cart { position: fixed; bottom: 80px; left: 16px; right: 16px; background: var(--card-white); border-radius: 60px; padding: 12px 20px; display: none; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 200; cursor: pointer; border: 1px solid var(--border-light); backdrop-filter: blur(10px); }
        
        /* Tracking Steps */
        .tracking-steps { display: flex; justify-content: space-between; margin: 30px 0; flex-wrap: wrap; }
        .step { text-align: center; flex: 1; min-width: 65px; }
        .step .circle { width: 50px; height: 50px; background: var(--card-white); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; border: 2px solid var(--border-light); font-size: 1.2rem; transition: 0.2s; }
        .step.active .circle { background: var(--primary); border-color: var(--primary); color: white; box-shadow: 0 0 15px var(--primary); animation: pulse 1.5s infinite; }
        .step.completed .circle { background: #10b981; border-color: #10b981; color: white; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 var(--primary); } 70% { box-shadow: 0 0 0 10px rgba(255,107,44,0); } 100% { box-shadow: 0 0 0 0 rgba(255,107,44,0); } }
        .step-label { font-size: 0.7rem; font-weight: 600; }
        
        /* Addresses */
        .address-card { background: var(--card-white); border-radius: 20px; padding: 14px; margin-bottom: 10px; border: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .address-card.active { border-color: var(--primary); background: #FFF5ED; }
        body.dark .address-card.active { background: #2D1B0F; }
        
        /* Admin Panel */
        .admin-restaurant-item { background: var(--card-white); border-radius: 20px; padding: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .toast { position: fixed; bottom: 100px; left: 20px; right: 20px; background: #1F2937; color: white; padding: 12px 20px; border-radius: 60px; text-align: center; z-index: 9999; opacity: 0; transition: 0.2s; pointer-events: none; font-size: 0.9rem; }
        .toast.show { opacity: 1; bottom: 120px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; background: transparent; border: none; color: var(--primary); font-weight: 600; margin-bottom: 20px; cursor: pointer; }
        .map-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; flex-direction: column; }
        #map { flex: 1; }
        
        /* Login Overlay */
        .login-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(12px); z-index: 20000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card-white); border-radius: 48px; padding: 32px; width: 100%; max-width: 360px; text-align: center; }
        input, select { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1px solid var(--border-light); background: var(--light-bg); margin-bottom: 12px; font-size: 1rem; }
    </style>
</head>
<body>
<div class="app-container">
    <header class="app-header" id="adminTrigger">
        <div class="logo">وصّال | Wassal</div>
        <div class="slogan">أسرع توصيل • جودة عالمية</div>
    </header>

    <!-- Pages -->
    <div id="homePage" class="page active-page">
        <div class="restaurants-grid" id="homeRestaurantsGrid"></div>
        <button id="trackOrderHomeBtn" class="btn-primary" style="display: none; margin-top: 20px;" onclick="window.trackCurrentOrder()">📍 تتبع طلبي الحالي</button>
    </div>
    <div id="restaurantsPage" class="page">
        <button class="back-btn" onclick="showPage('homePage')"><i class="fas fa-arrow-right"></i> رجوع</button>
        <div style="display: flex; gap: 10px; margin-bottom: 16px;">
            <input type="text" id="searchInput" placeholder="ابحث عن مطعم..." class="ripple">
            <select id="categoryFilter" class="ripple"></select>
        </div>
        <div class="restaurants-grid" id="restaurantsGrid"></div>
    </div>
    <div id="menuPage" class="page">
        <button class="back-btn" onclick="showPage('restaurantsPage')"><i class="fas fa-arrow-right"></i> رجوع للمطاعم</button>
        <div id="menuContent"></div>
        <div id="cartPreview" style="margin: 20px 0;"></div>
        <button class="btn-primary" id="viewCartBtn">عرض السلة والتوصيل</button>
    </div>
    <div id="cartPage" class="page">
        <button class="back-btn" onclick="showPage('menuPage')"><i class="fas fa-arrow-right"></i> رجوع للمنيو</button>
        <h3>🛒 سلتي</h3>
        <div id="cartItemsList"></div>
        <div id="addressSection" style="margin: 20px 0;">
            <h4>📍 عنوان التوصيل</h4>
            <div id="addressesList"></div>
            <button id="addNewAddressBtn" class="btn-outline" style="width:100%; margin-top: 10px;">+ إضافة عنوان جديد</button>
        </div>
        <div id="deliveryFeeDisplay" style="margin: 15px 0; font-weight: 600;"></div>
        <input type="text" id="couponInput" placeholder="كود الخصم (WELCOME10)" class="ripple">
        <button id="applyCoupon" class="btn-outline" style="margin-bottom: 15px;">تطبيق</button>
        <div id="cartTotalSummary"></div>
        <button id="checkoutBtn" class="btn-primary">تأكيد الطلب والدفع</button>
    </div>
    <div id="trackingPage" class="page">
        <button class="back-btn" onclick="showPage('homePage')"><i class="fas fa-arrow-right"></i> رجوع</button>
        <div id="trackingContent"></div>
    </div>
    <div id="ordersPage" class="page">
        <h3>📋 طلباتي السابقة</h3>
        <div id="pastOrdersList"></div>
    </div>
    <div id="settingsPage" class="page">
        <div class="card" id="darkModeToggle" style="display: flex; justify-content: space-between;">
            <span>🌙 الوضع الليلي</span>
            <i class="fas fa-toggle-off" id="darkIcon"></i>
        </div>
        <button id="logoutBtn" class="btn-primary" style="background: #ef4444; margin-top: 20px;">تسجيل الخروج</button>
    </div>
    <div id="adminPage" class="page">
        <h3>🛠 لوحة المدير</h3>
        <div id="adminRestaurantsList"></div>
        <div class="card" style="margin-top: 20px;">
            <h4>➕ إضافة مطعم جديد</h4>
            <input type="text" id="newResName" placeholder="اسم المطعم">
            <input type="text" id="newResCat" placeholder="التصنيف (مثل بروست)">
            <input type="text" id="newResImg" placeholder="رابط الصورة">
            <button id="pickLocationBtn" class="btn-outline" style="margin: 10px 0;">🗺 تحديد موقع المطعم على الخريطة</button>
            <input type="text" id="newResLat" placeholder="خط العرض (سيظهر تلقائياً)" readonly>
            <input type="text" id="newResLng" placeholder="خط الطول" readonly>
            <textarea id="newResItems" rows="3" placeholder="الأصناف (مثال: بروست دجاج:25, بطاطس:8, مشروب غازي:5)"></textarea>
            <button id="confirmAddRestaurant" class="btn-primary">إضافة المطعم</button>
        </div>
    </div>

    <div class="float-cart" id="floatCart" onclick="showPage('cartPage')">
        <div><span id="cartCount">0</span> أصناف</div>
        <div><span id="cartTotalPrice">0</span> ريال</div>
        <i class="fas fa-shopping-bag"></i>
    </div>
    <div class="bottom-nav">
        <div class="nav-item active" data-page="homePage"><i class="fas fa-home"></i><span>الرئيسية</span></div>
        <div class="nav-item" data-page="restaurantsPage"><i class="fas fa-utensils"></i><span>المطاعم</span></div>
        <div class="nav-item" data-page="ordersPage"><i class="fas fa-clipboard-list"></i><span>طلباتي</span></div>
        <div class="nav-item" data-page="settingsPage"><i class="fas fa-user"></i><span>حسابي</span></div>
    </div>
    <div id="toastMsg" class="toast"></div>
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <h3>مرحباً بك في وصّال</h3>
            <input type="text" id="loginName" placeholder="الاسم الكامل">
            <input type="tel" id="loginPhone" placeholder="رقم الهاتف">
            <button id="loginBtn" class="btn-primary">دخول / تسجيل</button>
            <div style="margin-top: 12px; font-size: 0.8rem; color: var(--text-muted);">الدخول للمندوب: كلمة السر weesim73741</div>
        </div>
    </div>
    <div id="mapOverlay" class="map-overlay"><div id="map"></div><div class="map-controls" style="display: flex;"><div class="map-back" onclick="closeMap()" style="flex:1; padding:20px; background:#0a2b3e; color:white; text-align:center;">رجوع</div><div class="map-confirm" onclick="confirmMapLocation()" style="flex:1; padding:20px; background:var(--primary); color:white; text-align:center;">تأكيد الموقع</div></div></div>
    <div id="addressModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:50000; align-items:center; justify-content:center; backdrop-filter:blur(8px);"><div style="background:var(--card-white); border-radius:48px; padding:24px; width:90%; max-width:320px;"><h4>إضافة عنوان</h4><input type="text" id="newAddressText" placeholder="العنوان بالتفصيل" style="margin:12px 0;"><button id="saveAddressBtn" class="btn-primary">حفظ</button><button id="closeAddressModal" style="margin-top:10px; background:#ddd; border:none; padding:10px; border-radius:40px; width:100%;">إلغاء</button></div></div>
</div>

<script>
    // Firebase config
    const firebaseConfig = { apiKey: "AIzaSyCMb07oP2PMUdTlffJjYkbfThC34x1dbtU", authDomain: "waselny-2812b.firebaseapp.com", databaseURL: "https://waselny-2812b-default-rtdb.firebaseio.com", projectId: "waselny-2812b", storageBucket: "waselny-2812b.firebasestorage.app", messagingSenderId: "662536104158", appId: "1:662536104158:web:666db40942313724c3fa4f" };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ADMIN_PASSWORD = "weesim73741";
    let currentUser = null, allRestaurants = [], cart = [], selectedAddress = null, userAddresses = [], deliveryFee = 8, couponDiscount = 0, currentRestaurant = null;
    let map, marker, tempLocation = null, currentMapCallback = null;

    // ---------- المطاعم الأساسية (جميع المطاعم والأصناف المحفوظة) ----------
    const defaultRestaurants = [
        { id: 1, name: "رويال بروستر", cat: "بروست", img: "https://images.unsplash.com/photo-1626645738196-c2a7c8d08f58?w=400", lat: 15.2851, lng: 44.2207, items: [{n:"بروست 4 قطع",p:3500},{n:"بروست 8 قطع",p:6800},{n:"وجبة حراق",p:3700},{n:"ساندوتش زنجر",p:1800},{n:"بطاطس عائلي",p:1200},{n:"برجر رويال",p:2000},{n:"بيبسي",p:400}] },
        { id: 2, name: "البيك رويال", cat: "بروست", img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=400", lat: 15.291, lng: 44.225, items: [{n:"وجبة مسحب",p:3200},{n:"بروست حراق",p:3600},{n:"ناجتس دجاج",p:2500},{n:"برجر دبل",p:2200},{n:"سلطة ملفوف",p:400}] },
        { id: 3, name: "مطعم القلعة", cat: "مأكولات", img: "https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=400", lat: 15.295, lng: 44.23, items: [{n:"بروست مع التوابع",p:1500},{n:"فحسة",p:3200},{n:"ذبيحة لحم حنيذ",p:8000},{n:"دجاج شواية",p:1100}] },
        { id: 4, name: "مطعم الشيباني", cat: "مأكولات", img: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=400", lat: 15.305, lng: 44.218, items: [{n:"عقدة لحم",p:4000},{n:"شيش طاووق",p:2500},{n:"مشاوي الشيباني",p:4800},{n:"فتة تمر",p:500}] },
        { id: 5, name: "مطعم روما", cat: "بيتزا", img: "https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=400", lat: 15.31, lng: 44.215, items: [{n:"بيتزا بالجبن",p:2500},{n:"بيتزا بالدجاج",p:3500},{n:"تشكن جريل",p:3000},{n:"برجر دجاج",p:1200}] }
    ];
    function loadRestaurants() { let saved = localStorage.getItem('wassal_restaurants'); if(saved) allRestaurants = JSON.parse(saved); else { allRestaurants = defaultRestaurants; saveRestaurants(); } }
    function saveRestaurants() { localStorage.setItem('wassal_restaurants', JSON.stringify(allRestaurants)); }
    loadRestaurants();

    // Helper functions
    function showToast(msg) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function showPage(pageId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(pageId).classList.add('active-page'); if(pageId === 'restaurantsPage') renderRestaurantsList(); if(pageId === 'homePage') renderHomeRestaurants(); if(pageId === 'adminPage' && currentUser?.isAdmin) renderAdminPanel(); if(pageId === 'ordersPage') renderPastOrders(); }
    function setActiveNav(pageId) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active'); }
    
    // Render restaurants
    function renderRestaurantsList() { let search = document.getElementById('searchInput')?.value.toLowerCase() || ''; let cat = document.getElementById('categoryFilter')?.value || 'all'; let filtered = allRestaurants.filter(r => r.name.toLowerCase().includes(search) && (cat === 'all' || r.cat === cat)); document.getElementById('restaurantsGrid').innerHTML = filtered.map(r => `<div class="res-card ripple" onclick="openRestaurantMenu(${r.id})"><img src="${r.img}" class="res-img"><div class="res-info"><h3>${r.name}</h3><div class="res-meta"><span>⭐ ${(Math.random()*1+4).toFixed(1)}</span><span>⏱️ 20-35 دقيقة</span><span class="badge-open">مفتوح</span></div></div></div>`).join(''); }
    function renderHomeRestaurants() { document.getElementById('homeRestaurantsGrid').innerHTML = allRestaurants.slice(0,4).map(r => `<div class="res-card ripple" onclick="openRestaurantMenu(${r.id})"><img src="${r.img}" class="res-img"><div class="res-info"><h3>${r.name}</h3><p>${r.cat}</p></div></div>`).join(''); }
    window.openRestaurantMenu = (id) => { currentRestaurant = allRestaurants.find(r=>r.id===id); cart = []; updateCartUI(); document.getElementById('menuContent').innerHTML = `<h3>🍽️ ${currentRestaurant.name}</h3><div class="menu-grid">${currentRestaurant.items.map((item,idx)=>`<div class="item-card"><img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=100" class="item-img"><div class="item-details"><h4>${item.n}</h4><div class="price">${item.p} ريال</div></div><button class="add-btn ripple" onclick="addToCart(${idx})"><i class="fas fa-plus"></i></button></div>`).join('')}</div>`; showPage('menuPage'); updateCartPreview(); };
    window.addToCart = (idx) => { let item = currentRestaurant.items[idx]; let existing = cart.find(i=>i.n===item.n); if(existing) existing.qty++; else cart.push({...item, qty:1}); updateCartUI(); showToast(`➕ تمت إضافة ${item.n}`); };
    function updateCartUI() { let total = cart.reduce((s,i)=>s+i.p*i.qty,0); let count = cart.reduce((s,i)=>s+i.qty,0); document.getElementById('cartCount').innerText = count; document.getElementById('cartTotalPrice').innerText = total; document.getElementById('floatCart').style.display = count ? 'flex' : 'none'; updateCartPreview(); }
    function updateCartPreview() { let total = cart.reduce((s,i)=>s+i.p*i.qty,0); document.getElementById('cartPreview').innerHTML = cart.length ? `<div class="card">🧾 ${cart.length} أصناف | الإجمالي ${total} ريال <i class="fas fa-chevron-left"></i></div>` : ''; }
    function renderCartPage() { if(!currentUser) return; let itemsHtml = cart.map((i,idx)=>`<div class="card" style="display:flex; justify-content:space-between;"><div><b>${i.n}</b> x${i.qty}</div><div>${i.p*i.qty} ريال <button class="ripple" onclick="removeCartItem(${idx})" style="background:#ffebee; border:none; border-radius:50px; padding:5px 12px; margin-right:8px;"><i class="fas fa-trash"></i></button></div></div>`).join('') || '<p>السلة فارغة</p>';
        document.getElementById('cartItemsList').innerHTML = itemsHtml;
        document.getElementById('addressesList').innerHTML = userAddresses.map((addr,idx)=>`<div class="address-card ${selectedAddress===addr?'active':''}" onclick="selectAddress('${addr}')"><i class="fas fa-map-pin"></i> ${addr}</div>`).join('');
        let subtotal = cart.reduce((s,i)=>s+i.p*i.qty,0);
        let total = subtotal + deliveryFee - couponDiscount;
        document.getElementById('deliveryFeeDisplay').innerHTML = `🚚 رسوم التوصيل: ${deliveryFee} ريال`;
        document.getElementById('cartTotalSummary').innerHTML = `<div class="card"><div>المجموع: ${subtotal} ريال</div><div>التوصيل: ${deliveryFee} ريال</div><div>الخصم: -${couponDiscount} ريال</div><div style="font-weight:800; margin-top:10px;">الإجمالي: ${total} ريال</div></div>`;
    }
    window.removeCartItem = (idx) => { cart.splice(idx,1); updateCartUI(); renderCartPage(); };
    function selectAddress(addr) { selectedAddress = addr; renderCartPage(); showToast(`تم اختيار العنوان: ${addr}`); }
    document.getElementById('applyCoupon').onclick = () => { let code = document.getElementById('couponInput').value; if(code === 'WELCOME10' && couponDiscount===0) { couponDiscount = 15; showToast("تم خصم 15 ريال"); renderCartPage(); } else showToast("كود غير صالح"); };
    document.getElementById('checkoutBtn').onclick = async () => { if(!cart.length) return showToast("السلة فارغة"); if(!selectedAddress) return showToast("اختر عنوان التوصيل"); let total = cart.reduce((s,i)=>s+i.p*i.qty,0) + deliveryFee - couponDiscount; let order = { id: Date.now(), restaurant: currentRestaurant.name, items: cart, address: selectedAddress, total, status: 'pending', customerId: currentUser.phone, createdAt: new Date().toISOString() }; await db.ref('orders/'+order.id).set(order); showToast("✅ تم إرسال الطلب"); cart = []; couponDiscount=0; updateCartUI(); localStorage.setItem('lastOrderId', order.id); showPage('homePage'); setActiveNav('homePage'); trackCurrentOrder(); };
    window.trackCurrentOrder = async () => { let orderId = localStorage.getItem('lastOrderId'); if(!orderId) return showToast("لا يوجد طلب نشط"); let snap = await db.ref('orders/'+orderId).once('value'); let order = snap.val(); if(!order) return; const steps = ['pending','on_the_way','arrived','delivered']; let idx = steps.indexOf(order.status); let html = `<div class="tracking-steps">${steps.map((s,i)=>{let cls=(i<idx)?'completed':(i===idx?'active':''); let icon={pending:'fa-clock',on_the_way:'fa-truck',arrived:'fa-map-marker-alt',delivered:'fa-check-circle'}[s]; return `<div class="step ${cls}"><div class="circle"><i class="fas ${icon}"></i></div><div class="step-label">${s==='pending'?'قيد المراجعة':s==='on_the_way'?'في الطريق':s==='arrived'?'وصل الموقع':'تم التوصيل'}</div></div>`;}).join('')}</div><div class="card"><p>🍽️ ${order.restaurant}</p><p>📍 ${order.address}</p><p>💰 ${order.total} ريال</p><p>🆔 #${order.id}</p></div>`; document.getElementById('trackingContent').innerHTML = html; showPage('trackingPage'); setInterval(async()=>{ let snap2 = await db.ref('orders/'+orderId).once('value'); let newOrder = snap2.val(); if(newOrder && document.getElementById('trackingPage').classList.contains('active-page')) { let newIdx = steps.indexOf(newOrder.status); if(newIdx !== idx) { idx = newIdx; showToast(`✅ تم تحديث الحالة: ${newOrder.status}`); document.getElementById('trackingContent').innerHTML = `<div class="tracking-steps">${steps.map((s,i)=>{let cls=(i<newIdx)?'completed':(i===newIdx?'active':''); let icon={pending:'fa-clock',on_the_way:'fa-truck',arrived:'fa-map-marker-alt',delivered:'fa-check-circle'}[s]; return `<div class="step ${cls}"><div class="circle"><i class="fas ${icon}"></i></div><div class="step-label">${s==='pending'?'قيد المراجعة':s==='on_the_way'?'في الطريق':s==='arrived'?'وصل الموقع':'تم التوصيل'}</div></div>`;}).join('')}</div><div class="card"><p>🍽️ ${newOrder.restaurant}</p><p>📍 ${newOrder.address}</p><p>💰 ${newOrder.total} ريال</p></div>`; } } }, 3000); };
    function renderPastOrders() { }
    // Admin panel
    function renderAdminPanel() { let html = allRestaurants.map(r=>`<div class="admin-restaurant-item"><div><b>${r.name}</b> (${r.cat})<br><small>📍 ${r.lat},${r.lng}</small><br><small>${r.items.length} صنف</small></div><button onclick="deleteRestaurant(${r.id})" style="background:#ef4444; border:none; color:white; padding:6px 12px; border-radius:50px;">حذف</button></div>`).join(''); document.getElementById('adminRestaurantsList').innerHTML = html; }
    window.deleteRestaurant = (id) => { if(confirm("حذف المطعم؟")) { allRestaurants = allRestaurants.filter(r=>r.id !== id); saveRestaurants(); renderAdminPanel(); renderRestaurantsList(); renderHomeRestaurants(); showToast("تم الحذف"); } };
    document.getElementById('pickLocationBtn').onclick = () => { initMapForPicker(); };
    function initMapForPicker() { document.getElementById('mapOverlay').style.display = 'flex'; setTimeout(()=>{ if(!map) { map = L.map('map').setView([15.3694,44.1910],13); L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']}).addTo(map); marker = L.marker([15.3694,44.1910],{draggable:true}).addTo(map); map.on('click', e=>marker.setLatLng(e.latlng)); } else map.setView([15.3694,44.1910],13); map.invalidateSize(); },100); }
    window.confirmMapLocation = () => { if(marker) { let pos = marker.getLatLng(); document.getElementById('newResLat').value = pos.lat; document.getElementById('newResLng').value = pos.lng; tempLocation = pos; closeMap(); showToast("تم تحديد موقع المطعم"); } };
    window.closeMap = () => { document.getElementById('mapOverlay').style.display = 'none'; };
    document.getElementById('confirmAddRestaurant').onclick = () => { let name = document.getElementById('newResName').value.trim(); let cat = document.getElementById('newResCat').value.trim(); let img = document.getElementById('newResImg').value.trim(); let lat = parseFloat(document.getElementById('newResLat').value); let lng = parseFloat(document.getElementById('newResLng').value); let itemsText = document.getElementById('newResItems').value; if(!name||!cat||!img||isNaN(lat)||isNaN(lng)) return showToast("املأ جميع الحقول وحدد الموقع"); let items = itemsText.split(',').map(i=>{ let p = i.split(':'); return {n:p[0].trim(), p:parseFloat(p[1])}; }).filter(i=>!isNaN(i.p)); if(items.length===0) return showToast("أدخل أصنافاً بصيغة اسم:سعر"); let newId = Date.now(); allRestaurants.push({id:newId, name, cat, img, lat, lng, items}); saveRestaurants(); renderAdminPanel(); renderRestaurantsList(); renderHomeRestaurants(); showToast("✅ تم إضافة المطعم"); document.getElementById('newResName').value=''; document.getElementById('newResCat').value=''; document.getElementById('newResImg').value=''; document.getElementById('newResLat').value=''; document.getElementById('newResLng').value=''; document.getElementById('newResItems').value=''; tempLocation=null; };
    // Addresses
    document.getElementById('addNewAddressBtn').onclick = () => { document.getElementById('addressModal').style.display = 'flex'; };
    document.getElementById('saveAddressBtn').onclick = () => { let addr = document.getElementById('newAddressText').value.trim(); if(addr && !userAddresses.includes(addr)) { userAddresses.push(addr); if(!selectedAddress) selectedAddress = addr; saveUserData(); renderCartPage(); showToast("تمت إضافة العنوان"); } document.getElementById('addressModal').style.display = 'none'; document.getElementById('newAddressText').value=''; };
    document.getElementById('closeAddressModal').onclick = () => { document.getElementById('addressModal').style.display = 'none'; };
    function saveUserData() { if(currentUser) localStorage.setItem(`wassal_${currentUser.phone}`, JSON.stringify({ addresses: userAddresses, selectedAddress })); }
    function loadUserData() { let data = localStorage.getItem(`wassal_${currentUser?.phone}`); if(data) { let d = JSON.parse(data); userAddresses = d.addresses || []; selectedAddress = d.selectedAddress || null; if(userAddresses.length===0) userAddresses = ["المنزل - صنعاء"]; if(!selectedAddress) selectedAddress = userAddresses[0]; } else { userAddresses = ["المنزل - صنعاء"]; selectedAddress = userAddresses[0]; } renderCartPage(); }
    // Login
    document.getElementById('loginBtn').onclick = async () => { let name = document.getElementById('loginName').value.trim(); let phone = document.getElementById('loginPhone').value.trim(); if(!name||!phone) return showToast("أدخل الاسم والرقم"); currentUser = { name, phone, isAdmin: false }; localStorage.setItem('wassal_user', JSON.stringify(currentUser)); loadUserData(); document.getElementById('loginOverlay').style.display = 'none'; showPage('homePage'); renderHomeRestaurants(); showToast(`أهلاً ${name}`); };
    // Admin secret (5 clicks on header)
    let adminClicks = 0; document.getElementById('adminTrigger').onclick = () => { adminClicks++; setTimeout(()=>adminClicks=0,800); if(adminClicks>=5){ let p = prompt("كلمة سر المدير"); if(p===ADMIN_PASSWORD) { currentUser = { name:"مدير", phone:"admin", isAdmin: true }; localStorage.setItem('wassal_user', JSON.stringify(currentUser)); document.getElementById('loginOverlay').style.display = 'none'; showPage('adminPage'); renderAdminPanel(); adminClicks=0; } else showToast("خطأ"); } };
    let savedUser = localStorage.getItem('wassal_user'); if(savedUser) { currentUser = JSON.parse(savedUser); document.getElementById('loginOverlay').style.display = 'none'; if(currentUser.isAdmin) showPage('adminPage'); else { showPage('homePage'); renderHomeRestaurants(); loadUserData(); } } else document.getElementById('loginOverlay').style.display = 'flex';
    document.getElementById('darkModeToggle').onclick = () => { document.body.classList.toggle('dark'); let icon = document.getElementById('darkIcon'); icon.className = document.body.classList.contains('dark') ? 'fas fa-toggle-on' : 'fas fa-toggle-off'; localStorage.setItem('darkMode', document.body.classList.contains('dark')); };
    if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('wassal_user'); location.reload(); };
    document.querySelectorAll('.nav-item').forEach(nav => nav.onclick = () => { let page = nav.dataset.page; if(page === 'adminPage' && !currentUser?.isAdmin) return showToast("غير مصرح"); showPage(page); setActiveNav(page); });
    document.getElementById('viewCartBtn').onclick = () => { if(cart.length===0) showToast("السلة فارغة"); else showPage('cartPage'); };
    // Filters
    let cats = [...new Set(allRestaurants.map(r=>r.cat))]; document.getElementById('categoryFilter').innerHTML = '<option value="all">الكل</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    document.getElementById('searchInput').addEventListener('input', ()=>renderRestaurantsList());
    document.getElementById('categoryFilter').addEventListener('change', ()=>renderRestaurantsList());
    renderHomeRestaurants(); renderRestaurantsList();
    setInterval(()=>{ if(currentUser) saveUserData(); }, 2000);
</script>
</body>
</html>
