<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>وصّال | Wassal - نظام التوصيل المتكامل</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        /* التنسيقات الأساسية لضمان عدم ظهور شاشة سوداء */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        :root { --primary-dark: #0a2b3e; --primary-light: #2dd4bf; --bg-light: #f8fafc; --card-light: #ffffff; --restaurant-accent: #f97316; }
        body { background: var(--bg-light); color: #1e293b; min-height: 100vh; overflow-x: hidden; }
        body.dark-mode { background: #0f172a; color: #f1f5f9; }
        
        .app-header { background: linear-gradient(135deg, var(--primary-dark), #1a4f6e); color: white; padding: 30px 20px; border-radius: 0 0 40px 40px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo-area h1 { font-size: 2.5rem; font-weight: 900; color: var(--primary-light); }
        
        main { padding: 20px 15px 100px; max-width: 600px; margin: 0 auto; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .active-page { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* البطاقات والخدمات */
        .services-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        .service-card { background: white; border-radius: 25px; padding: 20px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        body.dark-mode .service-card { background: #1e293b; border-color: #334155; }
        .service-icon { font-size: 2.5rem; margin-bottom: 10px; }
        
        /* الأزرار */
        .btn-send, .btn-primary { width: 100%; padding: 16px; background: var(--primary-light); border: none; border-radius: 50px; font-weight: 900; font-size: 1.1rem; color: var(--primary-dark); cursor: pointer; margin-top: 15px; }
        
        /* القائمة السفلية */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 1000; }
        body.dark-mode .bottom-nav { background: #1e293b; border-color: #334155; }
        .nav-item { text-align: center; color: #64748b; font-size: 0.8rem; cursor: pointer; }
        .nav-item.active { color: var(--primary-light); }
        .nav-item i { font-size: 1.5rem; display: block; }

        /* تسجيل الدخول */
        .login-overlay { position: fixed; inset: 0; background: var(--primary-dark); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 30px; border-radius: 30px; width: 100%; max-width: 400px; text-align: center; }
        .login-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; text-align: center; }
        
        /* الخريطة */
        .map-overlay { position: fixed; inset: 0; background: white; z-index: 10000; display: none; flex-direction: column; }
        #map { flex: 1; width: 100%; }
        .map-controls { display: flex; background: var(--primary-dark); }
        .map-confirm { flex: 1; padding: 20px; color: var(--primary-dark); background: var(--primary-light); text-align: center; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-card">
        <h2 style="margin-bottom: 20px;">مرحباً بك في وصّال</h2>
        <input type="text" id="customerName" placeholder="الاسم الكريم">
        <input type="tel" id="loginPhone" placeholder="رقم الهاتف">
        <button onclick="login()" class="btn-send">دخول الآن</button>
    </div>
</div>

<header class="app-header">
    <div class="logo-area"><h1>وصّال | Wassal</h1></div>
    <p>مشوارك أسرع.. وطلبك أقرب</p>
</header>

<main>
    <div id="homePage" class="page active-page">
        <h2 style="margin-bottom: 15px;">اختر خدمتك</h2>
        <div class="services-grid">
            <div class="service-card" onclick="openOrder('تاكسي 🚖')"><div class="service-icon">🚖</div><h3>تاكسي</h3></div>
            <div class="service-card" onclick="openOrder('دراجة 🏍️')"><div class="service-icon">🏍️</div><h3>موتور</h3></div>
            <div class="service-card" onclick="openOrder('توصيل 📦')"><div class="service-icon">📦</div><h3>توصيل طرود</h3></div>
            <div class="service-card" onclick="openOrder('تسوق 🛒')"><div class="service-icon">🛒</div><h3>شراء أغراض</h3></div>
        </div>
    </div>

    <div id="orderPage" class="page">
        <h3 id="serviceTitle" style="color: var(--primary-light); margin-bottom: 20px;"></h3>
        <div style="background: white; padding: 20px; border-radius: 20px; border: 1px solid #eee;">
            <p style="margin-bottom: 10px; font-weight: bold;">📍 حدد الموقع:</p>
            <button onclick="initMap('p')" class="btn-primary" style="background: #f1f5f9; color: #334155; margin-bottom: 10px;">من: <span id="pTxt">اختر من الخريطة</span></button>
            <button onclick="initMap('d')" class="btn-primary" style="background: #f1f5f9; color: #334155;">إلى: <span id="dTxt">اختر من الخريطة</span></button>
            
            <div style="margin-top: 20px; padding: 15px; background: #e0f2f1; border-radius: 15px; text-align: center;">
                السعر التقديري: <span id="finalPrice" style="font-size: 1.5rem; font-weight: 900; color: #00796b;">500</span> ريال
            </div>
            <button onclick="sendOrder()" class="btn-send">إرسال الطلب للمندوب</button>
            <button onclick="showPage('homePage')" class="btn-primary" style="background: #ccc;">إلغاء</button>
        </div>
    </div>
</main>

<nav class="bottom-nav">
    <div class="nav-item active" onclick="showPage('homePage')"><i class="fas fa-home"></i>الرئيسية</div>
    <div class="nav-item" onclick="showToast('قريباً')"><i class="fas fa-utensils"></i>المطاعم</div>
    <div class="nav-item" onclick="showToast('لا يوجد طلبات حالية')"><i class="fas fa-list"></i>طلباتي</div>
</nav>

<div id="mapOverlay" class="map-overlay">
    <div id="map"></div>
    <div class="map-controls">
        <div class="map-confirm" onclick="confirmLocation()">✅ تأكيد هذا الموقع</div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const FIREBASE_URL = "https://waselny-2812b-default-rtdb.firebaseio.com";
    let currentUser = JSON.parse(localStorage.getItem('waselny_user'));
    let map, marker, currentMode, selectedService;
    let locs = { p: null, d: null };

    // فحص تسجيل الدخول
    if (currentUser) document.getElementById('loginOverlay').style.display = 'none';

    function login() {
        const name = document.getElementById('customerName').value;
        const phone = document.getElementById('loginPhone').value;
        if (!name || !phone) return alert('يرجى إكمال البيانات');
        currentUser = { name, phone, role: 'customer' };
        localStorage.setItem('waselny_user', JSON.stringify(currentUser));
        document.getElementById('loginOverlay').style.display = 'none';
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(id).classList.add('active-page');
    }

    function openOrder(service) {
        selectedService = service;
        document.getElementById('serviceTitle').innerText = "طلب " + service;
        showPage('orderPage');
    }

    function initMap(mode) {
        currentMode = mode;
        document.getElementById('mapOverlay').style.display = 'flex';
        setTimeout(() => {
            if (!map) {
                map = L.map('map').setView([15.3694, 44.1910], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
                marker = L.marker([15.3694, 44.1910], {draggable: true}).addTo(map);
            }
            map.invalidateSize();
        }, 200);
    }

    function confirmLocation() {
        locs[currentMode] = marker.getLatLng();
        document.getElementById(currentMode + 'Txt').innerText = "✅ تم التحديد";
        document.getElementById('mapOverlay').style.display = 'none';
        if (locs.p && locs.d) {
            const dist = map.distance(locs.p, locs.d) / 1000;
            const price = Math.max(500, Math.round(dist * 180));
            document.getElementById('finalPrice').innerText = price;
        }
    }

    async function sendOrder() {
        if (!locs.p || !locs.d) return alert('يرجى تحديد المواقع');
        const orderId = Date.now();
        const orderData = {
            id: orderId,
            customer: currentUser.name,
            phone: currentUser.phone,
            service: selectedService,
            price: document.getElementById('finalPrice').innerText,
            status: 'pending',
            time: new Date().toISOString()
        };

        try {
            await fetch(`${FIREBASE_URL}/orders/${orderId}.json`, {
                method: 'PUT',
                body: JSON.stringify(orderData)
            });
            alert('✅ تم إرسال طلبك بنجاح! سيتم التواصل معك');
            showPage('homePage');
        } catch (e) {
            alert('خطأ في الاتصال بالقاعدة');
        }
    }

    function showToast(msg) { alert(msg); }
</script>

</body>
</html>
