<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>وصال - الإعدادات</title>
    <style>
        /* تنسيق بسيط وسريع لمحاكاة أزرار تطبيقك المميزة */
        body { font-family: Arial, sans-serif; background-color: #f8f9fa; padding: 20px; text-align: center; }
        .settings-container { max-width: 400px; margin: 0 auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn { display: block; width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; color: white; }
        .btn-onesignal { background-color: #20c997; }
        .btn-firebase { background-color: #3498db; }
        .btn-logout { background-color: #e74c3c; }
    </style>
</head>
<body>

    <div class="settings-container">
        <h3>الإصدار v9.0.0</h3>
        
        <button class="btn btn-onesignal">🔔 تفعيل الإشعارات (OneSignal)</button>
        
        <button class="btn btn-firebase">🔥 تفعيل إشعارات Firebase</button>
        
        <button class="btn btn-logout">تسجيل الخروج</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-messaging-compat.js"></script>

    <script>
      // إعدادات مشروعك الحقيقية والخاصة بـ (wassal-app-final)
      const firebaseConfig = {
        apiKey: "AIzaSyBvnmHgN1m4Xs-d-LBQo0ZBPGxm_Fzsrk",
        authDomain: "wassal-app-final.firebaseapp.com",
        projectId: "wassal-app-final",
        storageBucket: "wassal-app-final.appspot.com",
        messagingSenderId: "110183430414",
        appId: "1:110183430414:web:e4b8e88e31e91a0f61ff5f"
      };

      // تهيئة الفايربيس
      firebase.initializeApp(firebaseConfig);

      // دالة تفعيل الإشعارات الذكية المحدثة
      async function activateFirebaseNotifications() {
        try {
          // الفحص الحاسم: التحقق هل المتصفح الحالي يدعم الـ Messaging أم لا (يمنع الخطأ الأخضر)
          const isSupported = await firebase.messaging.isSupported();
          
          if (!isSupported) {
            alert('تنبيه: المتصفح الحالي أو البيئة الحالية لا تدعم إشعارات Firebase الحية. (يرجى فتح الموقع من متصفح Google Chrome رسمي لتفعيلها).');
            return;
          }

          const messaging = firebase.messaging();

          // التحقق من وجود السيرفس وركر في المتصفح
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/firebase-messaging-sw.js')
              .then((registration) => {
                console.log('تم تسجيل الـ Service Worker بنجاح في النطاق:', registration.scope);
                
                // طلب الإذن بالطريقة المتوافقة مع المتصفحات الحديثة والإصدار v9
                return Notification.requestPermission();
              })
              .then((permission) => {
                if (permission === 'granted') {
                  console.log('تم قبول إذن الإشعارات بنجاح!');
                  
                  // جلب التوكن الفرعي الخاص بالجهاز لإرسال الإشعارات إليه
                  return messaging.getToken();
                } else {
                  throw new Error('تم رفض إذن الإشعارات من قِبل المستخدم.');
                }
              })
              .then((token) => {
                if (token) {
                  console.log('Token الجهاز الحالي هو:', token);
                  alert('تم تفعيل إشعارات Firebase بنجاح في تطبيق وصال! 🎉');
                  // هنا يمكنك مستقبلاً إرسال التوكن لقاعدة بياناتك إذا أردت استهدافه بشكل فردي
                }
              })
              .catch((err) => {
                console.error('حدث خطأ أثناء التفعيل السلس:', err);
                alert('فشل التفعيل: ' + err.message);
              });
          } else {
            alert('المتصفح لا يدعم السيرفس وركر (Service Worker).');
          }
        } catch (error) {
          console.error('خطأ عام في الفحص:', error);
          alert('Firebase Messaging غير متوفر في هذه البيئة.');
        }
      }

      // ========================================================
      // 3. ربط الكود بالزر الخاص بك بشكل آمن وتلقائي
      // ========================================================
      document.addEventListener("DOMContentLoaded", function() {
        // البحث عن الزر في الصفحة الذي يحتوي على نص تفعيل إشعارات Firebase لربطه فوراً
        const firebaseBtn = Array.from(document.querySelectorAll('button, a, .btn'))
          .find(el => el.textContent.includes('تفعيل إشعارات Firebase'));

        if (firebaseBtn) {
          firebaseBtn.addEventListener('click', function(e) {
            e.preventDefault(); // منع أي سلوك افتراضي للزر
            activateFirebaseNotifications();
          });
          console.log('تم ربط كود الفايربيس بزر التفعيل الأزرق بنجاح!');
        } else {
          console.log('لم يتم العثور على الزر بنصه الحالي، تم تشغيل خيار الضغط الاحتياطي على الشاشة.');
          // حل احتياطي لتشغيل الدالة عند أول نقرة على الشاشة في حال تم تغيير نص الزر
          document.addEventListener('click', function() {
            activateFirebaseNotifications();
          }, { once: true });
        }
      });
    </script>
</body>
</html>
