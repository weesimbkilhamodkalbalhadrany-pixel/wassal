<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>وصّال | Wassal - تطبيق توصيل الطعام</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary-teal: #0f766e;
            --primary-teal-light: #14b8a6;
            --primary-teal-dark: #0f5c56;
            --bg-light: #f9fafb;
            --card-light: #ffffff;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --border-light: #eef2f6;
            --star-gold: #fbbf24;
        }

        body {
            background: var(--bg-light);
            color: var(--text-dark);
            min-height: 100vh;
            padding-bottom: 75px;
        }

        /* Header Teal */
        .app-header {
            background: linear-gradient(135deg, var(--primary-teal), var(--primary-teal-dark));
            padding: 20px 20px 28px;
            border-radius: 0 0 40px 40px;
            color: white;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .logo h1 {
            font-size: 1.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, #fff, var(--primary-teal-light));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo span {
            font-size: 0.7rem;
            color: var(--primary-teal-light);
            font-weight: 600;
            display: block;
        }

        .header-icons {
            display: flex;
            gap: 18px;
        }

        .header-icons i {
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-bar {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .search-bar i {
            font-size: 1.1rem;
            color: var(--primary-teal-light);
        }

        .search-bar input {
            background: transparent;
            border: none;
            flex: 1;
            font-size: 0.95rem;
            color: white;
            outline: none;
        }

        .search-bar input::placeholder {
            color: rgba(255, 255, 255, 0.85);
            font-weight: 500;
        }

        /* Categories Bar - minimalist linear icons */
        .categories-container {
            padding: 20px 16px 8px;
            overflow-x: auto;
            scrollbar-width: none;
            white-space: nowrap;
        }

        .categories-container::-webkit-scrollbar {
            display: none;
        }

        .categories-wrapper {
            display: flex;
            gap: 28px;
            justify-content: space-around;
        }

        .cat-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            min-width: 70px;
        }

        .cat-icon {
            width: 60px;
            height: 60px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: var(--primary-teal);
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-light);
            transition: all 0.2s;
        }

        .cat-item span {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .cat-item.active .cat-icon {
            background: var(--primary-teal-light);
            color: white;
            box-shadow: 0 8px 20px rgba(15, 118, 110, 0.3);
        }

        .cat-item.active span {
            color: var(--primary-teal);
            font-weight: 800;
        }

        /* Section header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 16px 16px 8px;
        }

        .section-header h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .section-header a {
            color: var(--primary-teal);
            font-size: 0.75rem;
            font-weight: 600;
            text-decoration: none;
        }

        /* Restaurant Cards */
        .restaurants-grid {
            padding: 8px 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .restaurant-card {
            background: var(--card-light);
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 10px 25px -8px rgba(0, 0, 0, 0.08);
            transition: 0.25s ease;
            border: 1px solid var(--border-light);
            cursor: pointer;
        }

        .restaurant-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.12);
        }

        .card-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .card-info {
            padding: 16px;
        }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .title-row h3 {
            font-size: 1.2rem;
            font-weight: 800;
        }

        .rating {
            background: #fef3c7;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 800;
            color: #b45309;
        }

        .rating i {
            color: var(--star-gold);
            margin-left: 4px;
        }

        .meta-details {
            display: flex;
            gap: 16px;
            margin: 12px 0;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .meta-details span i {
            margin-left: 5px;
        }

        .category-badge {
            background: #f1f5f9;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--primary-teal);
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            border-top: 1px solid var(--border-light);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 20px;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .nav-item {
            text-align: center;
            flex: 1;
            color: var(--text-muted);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            padding: 6px 0;
            border-radius: 30px;
        }

        .nav-item i {
            font-size: 1.5rem;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: var(--primary-teal-light);
            background: rgba(20, 184, 166, 0.1);
        }

        /* Toast message */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            font-weight: 600;
        }
        .toast.show {
            opacity: 1;
            bottom: 100px;
        }
    </style>
</head>
<body>

<!-- Header -->
<header class="app-header">
    <div class="header-top">
        <div class="logo">
            <h1>وصّال | Wassal</h1>
            <span>توصيل سريع وآمن</span>
        </div>
        <div class="header-icons">
            <i class="far fa-bell" id="notifyIcon"></i>
            <i class="fas fa-shopping-bag" id="cartIcon"></i>
        </div>
    </div>
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن مطعم أو وجبة...">
    </div>
</header>

<main>
    <!-- Categories (minimal icons, no bananas) -->
    <div class="categories-container">
        <div class="categories-wrapper" id="categoriesList">
            <!-- generated via js -->
        </div>
    </div>

    <!-- Restaurants section -->
    <div class="section-header">
        <h2>🍽️ المطاعم القريبة</h2>
        <a href="#" id="viewAllLink">عرض الكل <i class="fas fa-chevron-left"></i></a>
    </div>
    <div class="restaurants-grid" id="restaurantsGrid"></div>
</main>

<!-- Bottom Navigation -->
<nav class="bottom-nav">
    <div class="nav-item active" data-nav="home"><i class="fas fa-home"></i><span>الرئيسية</span></div>
    <div class="nav-item" data-nav="orders"><i class="fas fa-clipboard-list"></i><span>طلباتي</span></div>
    <div class="nav-item" data-nav="wallet"><i class="fas fa-wallet"></i><span>المحفظة</span></div>
    <div class="nav-item" data-nav="profile"><i class="fas fa-user-circle"></i><span>الملف الشخصي</span></div>
</nav>

<div id="toastMsg" class="toast"></div>

<script>
    // ------------------------------
    // Mock data (restaurants with high-res food images, no bananas)
    // ------------------------------
    const restaurantsData = [
        {
            id: 1,
            name: "رويال بروست",
            cat: "بروست",
            img: "https://images.unsplash.com/photo-1626645738196-c2a7c8d08f58?w=600&h=400&fit=crop",
            rating: 4.8,
            time: "30-40 دقيقة",
            distance: "1.2 كم",
            items: [{ name: "وجبة بروست (4 قطع)", price: 22 }, { name: "زنجر سوبريم", price: 24 }]
        },
        {
            id: 2,
            name: "شاورما هت",
            cat: "شاورما",
            img: "https://images.unsplash.com/photo-1644704170910-a0cdf183649b?w=600&h=400&fit=crop",
            rating: 4.6,
            time: "25-35 دقيقة",
            distance: "0.9 كم",
            items: [{ name: "شاورما دجاج", price: 8 }, { name: "شاورما لحم", price: 9 }]
        },
        {
            id: 3,
            name: "البيك رويال",
            cat: "بروست",
            img: "https://images.unsplash.com/photo-1562967914-608f82629710?w=600&h=400&fit=crop",
            rating: 4.9,
            time: "35-45 دقيقة",
            distance: "2.0 كم",
            items: [{ name: "بروست دجاج", price: 24 }, { name: "فيليه سمك", price: 22 }]
        }
    ];

    // categories with linear icons (no banana)
    const categories = [
        { id: "بروست", name: "بروست", icon: "fas fa-drumstick-bite" },
        { id: "بيتزا", name: "بيتزا", icon: "fas fa-pizza-slice" },
        { id: "برجر", name: "برجر", icon: "fas fa-hamburger" },
        { id: "عصائر", name: "عصائر", icon: "fas fa-wine-glass-alt" }
    ];

    let currentCategory = "بروست";
    let cart = [];

    // Helper: show toast
    function showToast(message) {
        const toast = document.getElementById('toastMsg');
        toast.innerText = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // Render categories bar
    function renderCategories() {
        const container = document.getElementById('categoriesList');
        if (!container) return;
        container.innerHTML = categories.map(cat => `
            <div class="cat-item ${cat.id === currentCategory ? 'active' : ''}" data-cat="${cat.id}">
                <div class="cat-icon"><i class="${cat.icon}"></i></div>
                <span>${cat.name}</span>
            </div>
        `).join('');

        // attach click events
        document.querySelectorAll('.cat-item').forEach(el => {
            el.addEventListener('click', () => {
                const catId = el.dataset.cat;
                currentCategory = catId;
                renderCategories();      // re-render to update active state
                filterAndRenderRestaurants();
            });
        });
    }

    // Filter restaurants based on current category
    function filterAndRenderRestaurants() {
        let filtered = restaurantsData.filter(r => r.cat === currentCategory);
        if (filtered.length === 0) filtered = restaurantsData.slice(0, 2); // fallback
        renderRestaurants(filtered);
    }

    // Render restaurant cards
    function renderRestaurants(restaurants) {
        const grid = document.getElementById('restaurantsGrid');
        if (!grid) return;
        if (restaurants.length === 0) {
            grid.innerHTML = `<div style="text-align:center; padding:40px;">لا توجد مطاعم في هذا التصنيف</div>`;
            return;
        }
        grid.innerHTML = restaurants.map(rest => `
            <div class="restaurant-card" data-id="${rest.id}">
                <img class="card-img" src="${rest.img}" alt="${rest.name}" loading="lazy" onerror="this.src='https://placehold.co/600x400?text=طعام'">
                <div class="card-info">
                    <div class="title-row">
                        <h3>${rest.name}</h3>
                        <div class="rating"><i class="fas fa-star"></i> ${rest.rating}</div>
                    </div>
                    <div class="meta-details">
                        <span><i class="far fa-clock"></i> ${rest.time}</span>
                        <span><i class="fas fa-map-marker-alt"></i> ${rest.distance}</span>
                    </div>
                    <div class="category-badge">${rest.cat}</div>
                </div>
            </div>
        `).join('');

        // add click listeners to cards
        document.querySelectorAll('.restaurant-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = parseInt(card.dataset.id);
                const restaurant = restaurantsData.find(r => r.id === id);
                if (restaurant) {
                    showToast(`تم فتح قائمة ${restaurant.name} (تجريبي)`);
                    // يمكن إضافة نافذة منبثقة أو توجيه لقائمة الطعام
                    // لكن حسب الصورة، هذا هو الحدث الأساسي
                }
            });
        });
    }

    // Handle view all (show all restaurants)
    function viewAllRestaurants() {
        renderRestaurants(restaurantsData);
        // reset active category highlight visually but keep state
        currentCategory = null;
        document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
        showToast("جميع المطاعم");
    }

    // Bottom navigation interaction (simulate pages)
    function setupBottomNav() {
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                const navType = item.dataset.nav;
                navItems.forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                if (navType === 'home') {
                    // reset to main view
                    currentCategory = "بروست";
                    renderCategories();
                    filterAndRenderRestaurants();
                    showToast("الرئيسية");
                } else if (navType === 'orders') {
                    showToast("طلباتي: لا توجد طلبات حالياً");
                } else if (navType === 'wallet') {
                    showToast("المحفظة: قريباً");
                } else if (navType === 'profile') {
                    showToast("الملف الشخصي: قيد التطوير");
                }
            });
        });
    }

    // Search functionality (basic)
    function setupSearch() {
        const searchInput = document.getElementById('searchInput');
        if (!searchInput) return;
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim().toLowerCase();
            if (query === "") {
                filterAndRenderRestaurants();
                return;
            }
            const filtered = restaurantsData.filter(r => r.name.includes(query) || r.cat.includes(query));
            renderRestaurants(filtered);
        });
    }

    // Header icons interactions
    function setupHeaderIcons() {
        const bell = document.getElementById('notifyIcon');
        const cart = document.getElementById('cartIcon');
        if (bell) bell.addEventListener('click', () => showToast("🔔 لا توجد إشعارات جديدة"));
        if (cart) cart.addEventListener('click', () => {
            if (cart.length === 0) showToast("السلة فارغة");
            else showToast(`السلة تحتوي على ${cart.length} أصناف (تجريبي)`);
        });
    }

    // Initialize page
    function init() {
        renderCategories();
        filterAndRenderRestaurants();  // shows default category "بروست"
        setupBottomNav();
        setupSearch();
        setupHeaderIcons();

        // view all link
        const viewAll = document.getElementById('viewAllLink');
        if (viewAll) {
            viewAll.addEventListener('click', (e) => {
                e.preventDefault();
                viewAllRestaurants();
            });
        }
    }

    // run when DOM ready
    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
