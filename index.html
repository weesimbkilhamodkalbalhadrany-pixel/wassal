            background: transparent;
            min-height: 100vh;
            position: relative;

    let map, marker, tempLocation = null;
    let activeOrderId = null;

    function showToast(msg) { let t = document.getElementById('toastMsg'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
    function showPage(pageId) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page')); document.getElementById(pageId).classList.add('active-page'); if(pageId === 'restosPage') renderAllRestos(); if(pageId === 'homePage') renderHome(); if(pageId === 'adminPage' && currentUser?.isAdmin) renderAdmin(); if(pageId === 'ordersPage') renderPastOrders(); }
    function setActiveNav(pageId) { document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); document.querySelector(`.nav-item[data-page="${pageId}"]`).classList.add('active'); }

    function renderHome() { let featured = restaurants.slice(0,4); document.getElementById('featuredRestos').innerHTML = featured.map(r => `<div class="resto-card" onclick="openResto(${r.id})"><img src="${r.img}" class="resto-img"><div class="resto-info"><h3>${r.name}</h3><p>${r.cat}</p></div></div>`).join(''); }
    function renderAllRestos() { let search = document.getElementById('searchResto')?.value.toLowerCase() || ''; let cat = document.getElementById('catFilter')?.value || 'all'; let filtered = restaurants.filter(r => r.name.toLowerCase().includes(search) && (cat === 'all' || r.cat === cat)); document.getElementById('allRestosList').innerHTML = filtered.map(r => `<div class="resto-card" onclick="openResto(${r.id})"><img src="${r.img}" class="resto-img"><div class="resto-info"><h3>${r.name}</h3><div class="resto-meta"><span>⭐ 4.5</span><span class="badge-open">مفتوح</span></div></div></div>`).join(''); }
    window.openResto = (id) => { currentResto = restaurants.find(r=>r.id===id); cart = []; updateCartUI(); document.getElementById('menuContainer').innerHTML = `<h3>🍽️ ${currentResto.name}</h3><div class="menu-grid">${currentResto.items.map((item,idx)=>`<div class="item-card"><img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=70" class="resto-img" style="width:60px;height:60px;"><div><h4>${item.n}</h4><div class="price" style="color:var(--primary); font-weight:800;">${item.p} ريال</div></div><div class="add-btn" onclick="addToCart(${idx})"><i class="fas fa-plus"></i></div></div>`).join('')}</div>`; showPage('menuPage'); updateCartPreview(); };
    window.addToCart = (idx) => { let item = currentResto.items[idx]; let existing = cart.find(i=>i.n===item.n); if(existing) existing.qty++; else cart.push({...item, qty:1}); updateCartUI(); showToast(`✨ تمت إضافة ${item.n}`); };
    function updateCartUI() { let total = cart.reduce((s,i)=>s+i.p*i.qty,0); let count = cart.reduce((s,i)=>s+i.qty,0); document.getElementById('cartCount').innerText = count; document.getElementById('cartTotal').innerText = total; document.getElementById('floatCart').style.display = count ? 'flex' : 'none'; updateCartPreview(); }
    function updateCartPreview() { let total = cart.reduce((s,i)=>s+i.p*i.qty,0); document.getElementById('cartPreview').innerHTML = cart.length ? `<div class="glass-card" style="padding:12px; text-align:center;">🛒 ${cart.length} أصناف | ${total} ريال <i class="fas fa-chevron-left"></i></div>` : ''; }
    function renderCartPage() { if(!currentUser) return; document.getElementById('cartItems').innerHTML = cart.map((i,idx)=>`<div class="glass-card" style="display:flex; justify-content:space-between; margin-bottom:8px;"><div><b>${i.n}</b> x${i.qty}</div><div>${i.p*i.qty} ريال <button onclick="removeItem(${idx})" style="background:#ef4444; border:none; color:white; border-radius:50px; padding:4px 10px;">حذف</button></div></div>`).join('') || '<p>السلة فارغة</p>';
        document.getElementById('addressesContainer').innerHTML = userAddresses.map((addr,idx)=>`<div class="address-item ${selectedAddress===addr?'active':''}" onclick="selectAddress('${addr}')"><i class="fas fa-map-pin"></i> ${addr}</div>`).join('');
        if(userAddresses.length===0) userAddresses = ["المنزل - صنعاء"]; if(!selectedAddress) selectedAddress = userAddresses[0];
        let subtotal = cart.reduce((s,i)=>s+i.p*i.qty,0); let total = subtotal + deliveryFee - couponDiscount;
        document.getElementById('deliveryFeeInfo').innerHTML = `🚚 رسوم التوصيل: ${deliveryFee} ريال`;
        document.getElementById('cartTotalSummary').innerHTML = `<div class="glass-card" style="padding:12px;"><div>المجموع: ${subtotal} ريال</div><div>التوصيل: ${deliveryFee} ريال</div><div>الخصم: -${couponDiscount} ريال</div><div style="font-weight:800;">الإجمالي: ${total} ريال</div></div>`;
    }
    window.removeItem = (idx) => { cart.splice(idx,1); updateCartUI(); renderCartPage(); };
    window.selectAddress = (addr) => { selectedAddress = addr; renderCartPage(); };
    document.getElementById('addAddressBtn').onclick = () => { document.getElementById('addressModal').style.display = 'flex'; };
    document.getElementById('saveAddressBtn').onclick = () => { let addr = document.getElementById('newAddressText').value.trim(); if(addr && !userAddresses.includes(addr)) { userAddresses.push(addr); if(userAddresses.length===1) selectedAddress=addr; saveUserData(); renderCartPage(); showToast("تمت الإضافة"); } document.getElementById('addressModal').style.display = 'none'; document.getElementById('newAddressText').value = ''; };
    document.getElementById('closeAddressModal').onclick = () => { document.getElementById('addressModal').style.display = 'none'; };
    document.getElementById('applyCouponBtn').onclick = () => { let code = document.getElementById('couponCode').value; if(code === 'WELCOME10' && couponDiscount===0) { couponDiscount = 15; showToast("تم خصم 15 ريال"); renderCartPage(); } else showToast("كود غير صالح"); };
    document.getElementById('confirmOrderBtn').onclick = async () => { if(!cart.length) return showToast("السلة فارغة"); if(!selectedAddress) return showToast("اختر عنواناً"); let subtotal = cart.reduce((s,i)=>s+i.p*i.qty,0); let total = subtotal + deliveryFee - couponDiscount; let order = { id: Date.now(), restaurant: currentResto.name, items: cart, address: selectedAddress, total, status: 'pending', customer: currentUser.phone, createdAt: new Date().toISOString() }; await db.ref('orders/'+order.id).set(order); activeOrderId = order.id; localStorage.setItem('activeOrder', activeOrderId); showToast("✅ تم إرسال الطلب"); cart=[]; couponDiscount=0; updateCartUI(); showPage('homePage'); setActiveNav('homePage'); trackCurrentOrder(); };
    window.trackCurrentOrder = async () => { let id = localStorage.getItem('activeOrder'); if(!id) return showToast("لا طلب نشط"); let snap = await db.ref('orders/'+id).once('value'); let o = snap.val(); if(!o) return; const steps = ['pending','on_the_way','arrived','delivered']; let idx = steps.indexOf(o.status); let html = `<div class="track-steps">${steps.map((s,i)=>{ let cls=(i<idx)?'completed':(i===idx?'active':''); let icon={pending:'fa-clock',on_the_way:'fa-truck',arrived:'fa-map-marker-alt',delivered:'fa-check-circle'}[s]; return `<div class="step ${cls}"><div class="circle"><i class="fas ${icon}"></i></div><div>${s==='pending'?'قيد المراجعة':s==='on_the_way'?'في الطريق':s==='arrived'?'وصل الموقع':'تم التوصيل'}</div></div>`; }).join('')}</div><div class="glass-card" style="padding:16px;"><p>🍽️ ${o.restaurant}</p><p>📍 ${o.address}</p><p>💰 ${o.total} ريال</p><p>🆔 #${o.id}</p></div>`; document.getElementById('trackingContent').innerHTML = html; showPage('trackingPage'); setInterval(async()=>{ let snap2 = await db.ref('orders/'+id).once('value'); let newO = snap2.val(); if(newO && document.getElementById('trackingPage').classList.contains('active-page')) { let newIdx = steps.indexOf(newO.status); if(newIdx !== idx) { idx = newIdx; document.getElementById('trackingContent').innerHTML = `<div class="track-steps">${steps.map((s,i)=>{ let cls=(i<newIdx)?'completed':(i===newIdx?'active':''); let icon={pending:'fa-clock',on_the_way:'fa-truck',arrived:'fa-map-marker-alt',delivered:'fa-check-circle'}[s]; return `<div class="step ${cls}"><div class="circle"><i class="fas ${icon}"></i></div><div>${s==='pending'?'قيد المراجعة':s==='on_the_way'?'في الطريق':s==='arrived'?'وصل الموقع':'تم التوصيل'}</div></div>`; }).join('')}</div><div class="glass-card" style="padding:16px;"><p>🍽️ ${newO.restaurant}</p><p>📍 ${newO.address}</p><p>💰 ${newO.total} ريال</p></div>`; showToast(`تحديث: ${newO.status}`); } } }, 3000); };
    function renderPastOrders() { document.getElementById('pastOrders').innerHTML = '<p>لا توجد طلبات سابقة</p>'; }
    // Admin panel
    function renderAdmin() { document.getElementById('adminRestosList').innerHTML = restaurants.map(r => `<div class="admin-resto-item"><div><b>${r.name}</b><br><small>${r.cat} | 📍${r.lat},${r.lng}</small></div><button onclick="deleteResto(${r.id})" style="background:#ef4444; border:none; color:white; padding:6px 12px; border-radius:50px;">حذف</button></div>`).join(''); }
    window.deleteResto = (id) => { if(confirm("حذف المطعم؟")) { restaurants = restaurants.filter(r=>r.id!==id); saveRestos(); renderAdmin(); renderAllRestos(); renderHome(); showToast("تم الحذف"); } };
    function initMapForPicker() { document.getElementById('mapOverlay').style.display='flex'; setTimeout(()=>{ if(!map){ map = L.map('map').setView([15.3694,44.1910],13); L.tileLayer('https://{s}.google.com/vt/lyrs=m&x={x}&y={y}&z={z}',{subdomains:['mt0','mt1','mt2','mt3']}).addTo(map); marker = L.marker([15.3694,44.1910],{draggable:true}).addTo(map); } else map.setView([15.3694,44.1910],13); map.invalidateSize(); },100); }
    window.confirmMapLoc = () => { if(marker){ let pos = marker.getLatLng(); document.getElementById('newLat').value = pos.lat; document.getElementById('newLng').value = pos.lng; tempLocation = pos; closeMap(); showToast("تم تحديد الموقع"); } };
    window.closeMap = () => { document.getElementById('mapOverlay').style.display='none'; };
    document.getElementById('pickLocationBtn').onclick = initMapForPicker;
    document.getElementById('addRestoBtn').onclick = () => { let name = document.getElementById('newName').value.trim(); let cat = document.getElementById('newCat').value.trim(); let img = document.getElementById('newImg').value.trim(); let lat = parseFloat(document.getElementById('newLat').value); let lng = parseFloat(document.getElementById('newLng').value); let itemsText = document.getElementById('newItems').value; if(!name||!cat||!img||isNaN(lat)||isNaN(lng)) return showToast("املأ الحقل وحدد الموقع"); let items = itemsText.split(',').map(i=>{ let p = i.split(':'); return {n:p[0].trim(), p:parseFloat(p[1])}; }).filter(i=>!isNaN(i.p)); if(items.length===0) return showToast("أدخل أصنافاً بصيغة اسم:سعر"); let newId = Date.now(); restaurants.push({id:newId, name, cat, img, lat, lng, items}); saveRestos(); renderAdmin(); renderAllRestos(); renderHome(); showToast("✅ تمت إضافة المطعم"); document.getElementById('newName').value=''; document.getElementById('newCat').value=''; document.getElementById('newImg').value=''; document.getElementById('newLat').value=''; document.getElementById('newLng').value=''; document.getElementById('newItems').value=''; };
    // User data
    function saveUserData() { if(currentUser) localStorage.setItem(`wassal_${currentUser.phone}`, JSON.stringify({ addresses: userAddresses, selectedAddress })); }
    function loadUserData() { let data = localStorage.getItem(`wassal_${currentUser?.phone}`); if(data) { let d = JSON.parse(data); userAddresses = d.addresses || ["المنزل - صنعاء"]; selectedAddress = d.selectedAddress || userAddresses[0]; } else { userAddresses = ["المنزل - صنعاء"]; selectedAddress = userAddresses[0]; } renderCartPage(); }
    // Login (no visible password)
    document.getElementById('loginBtn').onclick = async () => { let name = document.getElementById('loginName').value.trim(); let phone = document.getElementById('loginPhone').value.trim(); if(!name||!phone) return showToast("أدخل الاسم والرقم"); currentUser = { name, phone, isAdmin: false }; localStorage.setItem('wassal_user', JSON.stringify(currentUser)); loadUserData(); document.getElementById('loginOverlay').style.display = 'none'; showPage('homePage'); renderHome(); showToast(`أهلاً ${name}`); };
    // Hidden admin via header clicks (5 clicks)
    let adminClickCount = 0; document.querySelector('.hero').onclick = () => { adminClickCount++; setTimeout(()=>adminClickCount=0,800); if(adminClickCount>=5){ let pwd = prompt("كلمة السر المدير"); if(pwd === "weesim73741") { currentUser = { name:"مدير", phone:"admin", isAdmin: true }; localStorage.setItem('wassal_user', JSON.stringify(currentUser)); document.getElementById('loginOverlay').style.display = 'none'; showPage('adminPage'); renderAdmin(); } else showToast("خطأ"); adminClickCount=0; } };
    // Dark mode
    document.getElementById('darkModeToggle').onclick = () => { document.body.classList.toggle('dark'); let icon = document.getElementById('darkIcon'); icon.className = document.body.classList.contains('dark') ? 'fas fa-toggle-on' : 'fas fa-toggle-off'; localStorage.setItem('darkMode', document.body.classList.contains('dark')); };
    if(localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');
    document.getElementById('logoutBtn').onclick = () => { localStorage.removeItem('wassal_user'); location.reload(); };
    document.querySelectorAll('.nav-item').forEach(nav => nav.onclick = () => { let page = nav.dataset.page; if(page === 'adminPage' && !currentUser?.isAdmin) return showToast("غير مصرح"); showPage(page); setActiveNav(page); });
    document.getElementById('viewCartBtn').onclick = () => { if(cart.length===0) showToast("السلة فارغة"); else showPage('cartPage'); };
    // Filters
    let cats = [...new Set(restaurants.map(r=>r.cat))]; document.getElementById('catFilter').innerHTML = '<option value="all">الكل</option>'+cats.map(c=>`<option value="${c}">${c}</option>`).join('');
    document.getElementById('searchResto').addEventListener('input', ()=>renderAllRestos());
    document.getElementById('catFilter').addEventListener('change', ()=>renderAllRestos());
    // Initial load
    let savedUser = localStorage.getItem('wassal_user'); if(savedUser) { currentUser = JSON.parse(savedUser); if(currentUser.isAdmin) { document.getElementById('loginOverlay').style.display = 'none'; showPage('adminPage'); renderAdmin(); } else { document.getElementById('loginOverlay').style.display = 'none'; showPage('homePage'); renderHome(); loadUserData(); if(localStorage.getItem('activeOrder')) document.getElementById('trackBtn').style.display = 'block'; } } else document.getElementById('loginOverlay').style.display = 'flex';
    renderAllRestos(); renderHome();
</script>
</body>
</html>
